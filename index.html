<!DOCTYPE html>
<html lang="ko" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CineMap - 영화 시간표 & 관람자 모드</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* iOS 및 모바일 브라우저 터치 미끄러짐 최적화 */
    .scroll-container {
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* 스크롤바 숨기기 스타일 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 8bit pixel 폰트 느낌 */
    .pixel-text {
      font-family: 'Courier New', Courier, monospace;
      text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      letter-spacing: 1px;
    }
    /* 8bit 미니게임 맵 배경 */
    .pixel-map-bg {
      background-color: #8bba68;
      background-image: 
        linear-gradient(45deg, #7da95e 25%, transparent 25%, transparent 75%, #7da95e 75%, #7da95e),
        linear-gradient(45deg, #7da95e 25%, transparent 25%, transparent 75%, #7da95e 75%, #7da95e);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }
  </style>
</head>
<body class="bg-zinc-50 h-[100dvh] flex flex-col font-sans overflow-hidden select-none">

  <main class="flex-1 overflow-hidden relative flex flex-col">

    <div id="page-theater" class="page-content w-full h-full flex flex-col overflow-hidden">

          <button onclick="switchTheaterTab('seoul')" id="tab-seoul" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">

          <button onclick="switchTheaterTab('megabox')" id="tab-megabox" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">

          <button onclick="switchTheaterTab('wangcgv')" id="tab-wangcgv" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            왕십리 CGV
          </button>
          <button onclick="switchTheaterTab('laika')" id="tab-laika" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            라이카 시네마
          </button>
        </div>
      </div>

      <div class="flex-1 p-3 md:p-4 overflow-hidden flex flex-col">
        <div class="flex-1 relative bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col">
          <div id="content-ku" class="theater-tab-content w-full h-full flex-1 scroll-container">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe

            </div>
          </div>
          <div id="content-seoul" class="theater-tab-content w-full h-full flex-1 scroll-container hidden">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">

              </iframe>

          </div>
          <div id="content-megabox" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe

            </iframe>
          </div>
          <div id="content-wangcgv" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe

            </iframe>
          </div>
          <div id="content-laika" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe

              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Laika Cinema Timetable">
            </iframe>
          </div>
        </div>
      </div>
    </div>


    <div id="page-spectator" class="page-content w-full h-full flex flex-col overflow-hidden hidden">
      <div class="bg-white border-b shrink-0 px-4 py-4 flex justify-between items-center shadow-sm z-10">
        <h2 class="text-lg font-black text-emerald-900 flex items-center gap-1.5">
          <i data-lucide="gamepad-2" class="w-5 h-5 text-emerald-600"></i>
          시네마 타운
        </h2>
        <span id="spectator-shelf-count" class="text-xs bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-full font-bold shadow-inner border border-emerald-200"></span>
      </div>

      <div id="pixel-map-container" class="flex-1 overflow-y-auto p-6 scroll-container scrollbar-none pixel-map-bg flex flex-wrap content-start gap-6 justify-center">
        </div>
    </div>

    <div id="page-theater-booking" class="page-content relative w-full h-full bg-zinc-950 z-40 flex flex-col hidden overflow-hidden">
      <div class="bg-zinc-900 border-b border-zinc-800 px-4 py-4 shrink-0 flex justify-between items-center text-white">
        <button onclick="switchPage('spectator')" class="p-1 hover:bg-zinc-800 rounded-full transition-colors flex items-center">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h3 class="font-black text-sm flex items-center gap-1.5 text-zinc-100">
          <i data-lucide="popcorn" class="w-5 h-5 text-yellow-500"></i>
          시네마 스크린 매칭 룸
        </h3>
        <span class="w-5 h-5"></span>
      </div>

      <div class="flex-1 flex flex-col justify-between p-4 overflow-y-auto scrollbar-none">
        
        <div class="relative w-full py-4 flex flex-col items-center">
          <div class="w-4/5 h-2.5 bg-zinc-800 rounded-t-full shadow-[0_4px_30px_rgba(255,255,255,0.15)] mb-3"></div>
          
          <div id="cinema-projection-screen" class="w-full max-w-md aspect-[16/9] bg-zinc-900 border border-zinc-800 rounded-2xl p-0 text-center flex flex-col justify-center items-center relative overflow-hidden transition-all duration-300 shadow-2xl">
            <div id="projection-screen-default" class="text-zinc-500 flex flex-col items-center gap-2 p-4">
              <i data-lucide="aperture" class="w-7 h-7 text-indigo-500/60 animate-spin" style="animation-duration: 10s"></i>
              <p id="projection-director-banner" class="text-sm font-black tracking-widest text-zinc-300 uppercase"></p>
              <p class="text-[9px] text-zinc-600 mt-2">등록된 시네마 좌석을 탭하여 감상하거나, 빈 좌석을 예매해 보세요.</p>
            </div>
            
            <div id="projection-screen-active" class="hidden w-full h-full relative group">
              <img id="projection-bg-img" class="absolute inset-0 w-full h-full object-cover opacity-30" src="" />
              
              <div class="absolute inset-0 p-4 flex flex-col justify-end bg-gradient-to-t from-black via-black/50 to-transparent">
                <span id="projection-movie-badge" class="self-start bg-indigo-900/80 text-indigo-200 text-[10px] font-bold px-2 py-0.5 rounded uppercase mb-1"></span>
                <h4 id="projection-title" class="text-lg font-black text-white truncate text-left drop-shadow-md"></h4>
                <p id="projection-desc" class="text-xs text-zinc-300 mt-1 leading-snug line-clamp-2 text-left drop-shadow-md"></p>
              </div>

              <button onclick="prevProjectionSlide(event)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity z-20">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
              </button>
              <button onclick="nextProjectionSlide(event)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 p-1.5 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity z-20">
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>
              
              <div id="projection-indicators" class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1 z-20">
              </div>
            </div>
            
          </div>
        </div>

        <div class="py-2 flex flex-col items-center pb-20"> 
          <div class="text-[10px] font-bold text-zinc-600 mb-4 tracking-widest">THEATER SEATING CHART</div>
          
          <div class="grid grid-cols-8 gap-2 max-w-md w-full px-2" id="theater-seat-grid">
            </div>
        </div>

        <div class="flex justify-center gap-4 py-2 shrink-0 border-t border-zinc-900 mt-4 mb-8">
          <div class="flex items-center gap-1.5">
            <div class="w-4 h-4 bg-zinc-800 border border-zinc-700 rounded-md"></div>
            <span class="text-[10px] text-zinc-400 font-bold">비어있음 (예매가능)</span>
          </div>
          <div class="flex items-center gap-1.5">
            <div class="w-4 h-4 bg-indigo-600 border border-indigo-500 rounded-md flex items-center justify-center text-[9px] text-white font-bold">A</div>
            <span class="text-[10px] text-zinc-400 font-bold">채워짐 (상영중)</span>
          </div>
        </div>

      </div>

      <div id="floating-booking-bar" class="absolute bottom-6 left-0 w-full px-6 hidden z-50 transition-all duration-300">
        <button id="floating-book-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.6)] flex items-center justify-center gap-2 border border-indigo-400 hover:bg-indigo-700 active:scale-95 transition-transform">
          <i data-lucide="ticket" class="w-5 h-5"></i>
          <span id="floating-book-text">좌석 예매하기</span>
        </button>
      </div>

    </div>

    <div id="page-mycine" class="page-content w-full h-full flex flex-col overflow-hidden hidden bg-zinc-50">
      <div class="bg-white border-b shrink-0 px-4 py-4 flex justify-between items-center">
        <h2 class="text-lg font-black text-gray-900 flex items-center gap-1.5">
          <i data-lucide="heart" class="w-5 h-5 text-rose-500 fill-rose-500"></i>
          마이 CINE 아카이브
        </h2>
        <span id="mycine-count" class="text-xs bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full font-bold"></span>
      </div>

      <div class="p-3 bg-white border-b shrink-0">
        <div class="relative flex items-center bg-zinc-50 border rounded-xl px-3 py-2.5">
          <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2 shrink-0"></i>
          <input type="text" id="mycine-search-input" onkeyup="handleMyCineSearch(this.value)" placeholder="영화 제목으로 검색하여 필터링..." class="w-full text-xs focus:outline-none bg-transparent">
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-4 scroll-container scrollbar-none" id="mycine-list-container">
        </div>
    </div>

    <div id="page-mycine-detail" class="page-content w-full h-full bg-white z-50 flex flex-col hidden overflow-hidden">
      <div class="bg-zinc-50 border-b px-4 py-4 shrink-0 flex justify-between items-center">
        <button onclick="switchPage('mycine')" class="p-1 hover:bg-zinc-200 rounded-full transition-colors flex items-center text-gray-600">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h3 class="font-black text-md text-gray-900 flex items-center gap-1.5">
          아카이브 상세 정보
        </h3>
        <div class="flex items-center gap-2">
          <button id="btn-delete-spot-page" class="bg-rose-50 text-rose-500 hover:bg-rose-100 text-xs font-black px-3.5 py-2 rounded-xl transition-all">
            삭제
          </button>
          <button id="btn-edit-spot-page" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 text-xs font-black px-3.5 py-2 rounded-xl transition-all">
            수정하기
          </button>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto p-5 space-y-5 scrollbar-none">
        <div>
          <div class="flex flex-wrap items-center gap-2">
            <span id="mydetail-movie" class="bg-indigo-50 text-indigo-600 text-xs font-black px-2.5 py-1 rounded-full uppercase tracking-wider"></span>
            <span id="mydetail-director" class="bg-zinc-100 text-zinc-600 text-xs font-bold px-2.5 py-1 rounded-full"></span>
          </div>
          <h2 id="mydetail-title" class="text-xl font-black text-gray-900 mt-2"></h2>
        </div>

        <div>
          <span class="text-xs font-black text-gray-400 block mb-2">① 영화 속 명장면</span>
          <div id="mydetail-still-gallery" class="flex gap-2.5 overflow-x-auto pb-1 scrollbar-none snap-x"></div>
        </div>

        <div>
          <span class="text-xs font-black text-indigo-500 block mb-2">② 내 컷 기록</span>
          <div id="mydetail-real-gallery" class="flex gap-2.5 overflow-x-auto pb-1 scrollbar-none snap-x"></div>
        </div>

        <div class="bg-zinc-50 border rounded-2xl p-4">
          <span class="text-xs font-bold text-gray-400 block mb-1">상세 기록</span>
          <p id="mydetail-desc" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap"></p>
        </div>
      </div>
    </div>


    <div id="page-add-location" class="page-content w-full h-full bg-white z-50 flex flex-col hidden relative">
      <div class="bg-zinc-50 border-b px-4 py-4 shrink-0 flex justify-between items-center">
        <button onclick="closeAddLocationPage()" class="p-1 hover:bg-zinc-200 rounded-full transition-colors flex items-center text-gray-600">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h3 id="form-page-header-title" class="font-black text-md text-gray-900 flex items-center gap-1.5">
          <i data-lucide="clapperboard" class="w-5 h-5 text-indigo-600"></i>
          나만의 명장면 기록
        </h3>
        <span class="w-5 h-5"></span>
      </div>

      <form id="add-location-form" onsubmit="handleNewLocationSubmit(event)" class="p-5 flex-1 overflow-y-auto space-y-5 scrollbar-none">
        
        <input type="hidden" id="form-edit-id"> <input type="hidden" id="form-seat">    <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">영화 제목 (필수)</label>
            <input type="text" id="form-movie" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="">
          </div>
          <div class="relative">
            <label class="block text-xs font-bold text-gray-600 mb-1.5">영화 감독 (필수)</label>
            <input type="text" id="form-director" autocomplete="off" onkeyup="handleDirectorAutoSuggest(this.value)" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="">
            <div id="dir-suggest-dropdown" class="absolute left-0 right-0 mt-1 bg-white rounded-xl shadow-xl border border-zinc-100 max-h-36 overflow-y-auto hidden z-30"></div>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1.5">명장면 명칭 (선택)</label>
          <input type="text" id="form-title" class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1.5">상세 소개 (선택)</label>
          <textarea id="form-desc" rows="3" class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder=""></textarea>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">① 영화 속 명장면 업로드 (여러 장 가능)</label>
            <div class="border border-dashed border-zinc-200 rounded-xl p-4 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-28 transition-colors">
              <input type="file" id="form-still-file" accept="image/*" multiple class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewMultipleImages(this, 'preview-still-container')">
              <div class="text-center text-gray-400">
                <i data-lucide="image-plus" class="w-6 h-6 mx-auto mb-1 text-gray-400"></i>
                <span class="text-xs">사진 파일들 선택하기</span>
              </div>
            </div>
            <div id="preview-still-container" class="flex gap-2 overflow-x-auto mt-2.5 scrollbar-none"></div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">② 나의 기록 컷 (여러 장 가능)</label>
            <div class="border border-dashed border-zinc-200 rounded-xl p-4 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-28 transition-colors">
              <input type="file" id="form-real-file" accept="image/*" multiple class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewMultipleImages(this, 'preview-real-container')">
              <div class="text-center text-gray-400">
                <i data-lucide="camera" class="w-6 h-6 mx-auto mb-1 text-indigo-400"></i>
                <span class="text-xs">사진 파일들 선택하기</span>
              </div>
            </div>
            <div id="preview-real-container" class="flex gap-2 overflow-x-auto mt-2.5 scrollbar-none"></div>
          </div>
        </div>
      </form>

      <div class="bg-white border-t px-6 py-4 shrink-0 flex gap-3 shadow-[0_-4px_12px_rgba(0,0,0,0.03)] z-20">
        <button type="button" onclick="closeAddLocationPage()" class="w-1/3 border border-gray-200 font-bold py-3.5 rounded-xl text-gray-600 text-sm hover:bg-gray-50 transition-colors">취소</button>
        <button type="button" onclick="triggerFormSubmit()" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-sm transition-colors shadow-md">저장하기</button>
      </div>
    </div>

  </main>

  <nav id="app-bottom-nav" class="bg-white border-t shrink-0 z-40 shadow-lg transition-all duration-300">
    <div class="flex h-16 justify-around items-center">
      <button onclick="switchPage('theater')" id="nav-theater" class="w-1/3 flex flex-col items-center justify-center h-full text-indigo-600 transition-colors">
        <i data-lucide="film" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">영화관</span>
      </button>
      <button onclick="switchPage('spectator')" id="nav-spectator" class="w-1/3 flex flex-col items-center justify-center h-full text-gray-400 hover:text-indigo-600 transition-colors">

        <span class="text-xs font-bold">관람자</span>
      </button>
      <button onclick="switchPage('mycine')" id="nav-mycine" class="w-1/3 flex flex-col items-center justify-center h-full text-gray-400 hover:text-indigo-600 transition-colors">
        <i data-lucide="heart" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">마이CINE</span>
      </button>
    </div>
  </nav>

  <div id="add-director-modal" class="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col">
      <div class="p-5 bg-indigo-600 text-white flex justify-between items-center shrink-0">
        <h3 class="font-black text-sm flex items-center gap-1.5">
          <i data-lucide="user-plus" class="w-5 h-5"></i>
          새로운 영화 감독 추가
        </h3>
        <button onclick="closeAddDirectorModal()" class="p-1 hover:bg-indigo-700 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form onsubmit="handleNewDirectorSubmit(event)" class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-black text-gray-600 mb-1.5">감독 성함 (전체 이름)</label>
          <input type="text" id="form-dir-name" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500 bg-gray-50 focus:bg-white transition-colors">
        </div>
        <div>
          <label class="block text-xs font-black text-gray-600 mb-1.5">대표 이모지 (선택)</label>
          <div class="flex gap-2">
            <input type="text" id="form-dir-emoji" class="w-16 border border-gray-200 px-3 py-3 text-sm rounded-xl text-center focus:ring-2 focus:ring-indigo-500 bg-gray-50 focus:bg-white transition-colors" placeholder="👤" value="👤" maxlength="2">
            <p class="text-[10px] text-gray-400 self-center">대표 이모지 1개를 적어주세요.</p>
          </div>
        </div>
        <div class="pt-2 flex gap-2">
          <button type="button" onclick="closeAddDirectorModal()" class="w-1/3 border border-gray-200 font-bold py-3.5 rounded-xl text-gray-600 text-xs hover:bg-gray-50 transition-colors">취소</button>
          <button type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-xs transition-colors shadow-md">감독 등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <div id="confirm-modal" class="fixed inset-0 bg-black/60 z-[210] flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl p-6 space-y-4 flex flex-col">
      <div class="flex items-center gap-2 text-rose-500">
        <i data-lucide="alert-triangle" class="w-6 h-6 shrink-0"></i>
        <h3 class="font-black text-lg text-gray-900" id="confirm-title">아카이브 삭제</h3>
      </div>
      <p class="text-xs text-gray-500 leading-relaxed" id="confirm-message">이 작업은 영구히 복구할 수 없습니다. 정말로 삭제하시겠습니까?</p>
      <div class="flex gap-2.5 pt-2">
        <button id="btn-confirm-cancel" class="w-1/2 border border-zinc-200 font-extrabold py-3.5 rounded-xl text-zinc-600 text-xs hover:bg-zinc-50 transition-colors">취소</button>
        <button id="btn-confirm-ok" class="w-1/2 bg-rose-600 hover:bg-rose-700 text-white font-extrabold py-3.5 rounded-xl text-xs transition-colors shadow-md">삭제하기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-zinc-900 text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-xl opacity-0 translate-y-3 pointer-events-none transition-all duration-300 z-[110] flex items-center gap-1.5 whitespace-nowrap">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span id="toast-message">저장 완료!</span>
  </div>

  <script>
    const DEFAULT_LOCATIONS = [];
    let filmingLocations = [];
    let directorsList = [];
    let currentStillCutsBase64 = [];
    let currentRealPhotosBase64 = [];
    let selectedTheaterDirectorName = "";

    // 캐러셀 상태 변수
    let currentProjectionImages = [];
    let currentProjectionIndex = 0;

    const DEFAULT_DIRECTORS = [
      { id: "dir-preset-1", name: "페드로 알모도바르", shortName: "알모도바르", emoji: "🎨" },
      { id: "dir-preset-2", name: "박찬욱", shortName: "박찬욱", emoji: "🔨" },
      { id: "dir-preset-3", name: "데이비드 린치", shortName: "린치", emoji: "🌀" },
      { id: "dir-preset-4", name: "고레에다 히로카즈", shortName: "고레에다", emoji: "🏠" }
    ];

    function showCustomConfirm(title, message, onOk) {
      const modal = document.getElementById('confirm-modal');
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-message').textContent = message;
      modal.classList.remove('hidden');
      document.getElementById('btn-confirm-cancel').onclick = () => { modal.classList.add('hidden'); };
      document.getElementById('btn-confirm-ok').onclick = () => { modal.classList.add('hidden'); onOk(); };
    }

    function loadDirectorsFromStorage() {
      const stored = localStorage.getItem('cineMapSavedDirectors');
      if (stored) { directorsList = JSON.parse(stored); } 
      else { directorsList = [...DEFAULT_DIRECTORS]; saveDirectorsToStorage(); }
    }

    function saveDirectorsToStorage() { localStorage.setItem('cineMapSavedDirectors', JSON.stringify(directorsList)); }

    function loadLocationsFromStorage() {
      const stored = localStorage.getItem('cineMapSavedLocations');
      if (stored) { filmingLocations = JSON.parse(stored); } 
      else { filmingLocations = [...DEFAULT_LOCATIONS]; saveLocationsToStorage(); }
    }

    function saveLocationsToStorage() { localStorage.setItem('cineMapSavedLocations', JSON.stringify(filmingLocations)); }

    // 관람자 8bit 미니게임 맵 렌더링 함수
    function renderBookshelf() {
      const container = document.getElementById('pixel-map-container');
      const countLabel = document.getElementById('spectator-shelf-count');
      if (!container) return;

      countLabel.textContent = `시네마 ${directorsList.length}관`;
      container.innerHTML = '';
      
      let combinedList = [...directorsList];
      
      combinedList.forEach(dir => {
        const spots = filmingLocations.filter(loc => loc.director === dir.name);
        
        const building = document.createElement('div');
        building.className = "flex flex-col items-center cursor-pointer group";
        building.onclick = () => openSeatAddWithDirector(dir.name);
        
        // 8bit 영화관 건물 CSS 조립
        building.innerHTML = `
          <div class="w-20 h-20 bg-zinc-800 border-4 border-zinc-900 shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] flex flex-col relative transition-transform group-active:translate-y-1 group-active:shadow-[0px_0px_0_0_rgba(0,0,0,0.5)]">
             <div class="h-6 w-full bg-rose-600 border-b-4 border-zinc-900 flex items-center justify-center overflow-hidden">
            
             </div>
             <div class="flex-1 flex justify-center items-end pb-1 bg-zinc-700">
               <div class="w-8 h-8 bg-zinc-900 flex border-2 border-zinc-900">
                 <div class="w-1/2 h-full bg-cyan-200/40 border-r border-zinc-900"></div>
                 <div class="w-1/2 h-full bg-cyan-200/40"></div>
               </div>
             </div>
             <div class="absolute -top-3 -right-3 bg-yellow-400 border-2 border-zinc-900 text-zinc-900 text-[10px] font-black px-1.5 py-0.5 z-10">
               ${spots.length}
             </div>
          </div>
          <div class="mt-3 bg-white border-1 border-zinc-900 px-2 pt-0 py-1 group-active:translate-y-1">
            <span class="text-[10px] font-bold">${dir.name}</span>
          </div>
        `;
        
        container.appendChild(building);
      });

      // 최하단 새 감독 추가 유도 버튼
      const addDirRow = document.createElement('div');
      addDirRow.className = "flex justify-center w-full mt-8 pb-8";
      addDirRow.innerHTML = `
        <button onclick="openAddDirectorModal()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 text-white px-4 py-2 rounded-sm font-bold text-xs border-2 border-zinc-900 active:translate-y-1 active:shadow-[0px_0px_0_0_rgba(0,0,0,0.5)] transition-all pixel-text">
          <i data-lucide="plus" class="w-4 h-4"></i> 타운 증축하기
        </button>
      `;
      container.appendChild(addDirRow);

      lucide.createIcons();
    }

    // 감독 영화관 클릭 시 해당 스크린룸 이동
    function openSeatAddWithDirector(directorName) {
      switchPage('theater-booking');
      loadTheaterDirectorSeats(directorName);
    }

    // 가상 영화관 좌석 렌더링
    function loadTheaterDirectorSeats(directorName) {
      selectedTheaterDirectorName = directorName;
      
      const banner = document.getElementById('projection-director-banner');
      banner.textContent = `Directed by ${directorName}`;

      resetTheaterProjection();
      document.getElementById('floating-booking-bar').classList.add('hidden');

      const grid = document.getElementById('theater-seat-grid');
      if (!grid) return;
      grid.innerHTML = '';

      // 40석 생성
      for (let i = 1; i <= 40; i++) {
        const seatCode = i.toString();
        const matchSpot = filmingLocations.find(loc => loc.director === directorName && loc.seat === seatCode);

        const seatBtn = document.createElement('button');
        seatBtn.type = 'button';
        seatBtn.id = `seat-btn-${seatCode}`;

        if (matchSpot) {
          // 채워진 좌석
          seatBtn.className = "aspect-square rounded-md bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-extrabold text-[10px] shadow-md border border-indigo-500 transition-all flex items-center justify-center relative";
          seatBtn.innerHTML = `<span>${seatCode}</span>`;
          seatBtn.onclick = () => {
            playMovieOnScreen(matchSpot);
            // 본인이 등록한 항목(여기서는 모두 본인으로 간주) 클릭 시 토스트 노출
            if(matchSpot.isMine) {
              showToast("본인이 예매한 내역입니다.");
            }
          };
        } else {
          // 비어있는 좌석
          seatBtn.className = "aspect-square rounded-md bg-zinc-800 hover:bg-zinc-700 active:scale-95 text-zinc-500 hover:text-zinc-300 font-medium text-[10px] border border-zinc-700 transition-all flex items-center justify-center";
          seatBtn.innerHTML = `<span>${seatCode}</span>`;
          seatBtn.onclick = () => bookEmptySeat(directorName, seatCode);
        }

        grid.appendChild(seatBtn);
      }
    }

    function resetTheaterProjection() {
      document.getElementById('projection-screen-default').classList.remove('hidden');
      document.getElementById('projection-screen-active').classList.add('hidden');
      currentProjectionImages = [];
      currentProjectionIndex = 0;
    }

    // 스크린룸 캐러셀 뷰 로직
    function playMovieOnScreen(spot) {
      document.getElementById('floating-booking-bar').classList.add('hidden');
      document.querySelectorAll('.empty-seat-selected').forEach(el => {
        el.classList.remove('empty-seat-selected', 'ring-2', 'ring-indigo-400', 'bg-zinc-700');
        el.classList.add('bg-zinc-800');
      });

      document.getElementById('projection-screen-default').classList.add('hidden');
      const activeScreen = document.getElementById('projection-screen-active');
      activeScreen.classList.remove('hidden');

      currentProjectionImages = [];
      if (spot.stillCuts && spot.stillCuts.length > 0) currentProjectionImages.push(...spot.stillCuts);
      if (spot.realPhotos && spot.realPhotos.length > 0) currentProjectionImages.push(...spot.realPhotos);
      
      if (currentProjectionImages.length === 0) {
        currentProjectionImages.push('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop');
      }

      currentProjectionIndex = 0;
      updateProjectionView(spot);
    }

    function updateProjectionView(spot) {
      if(currentProjectionImages.length === 0) return;
      
      const imgSrc = currentProjectionImages[currentProjectionIndex];
      document.getElementById('projection-bg-img').src = imgSrc;
      document.getElementById('projection-movie-badge').textContent = `${spot.movie} (좌석 ${spot.seat})`;
      document.getElementById('projection-title').textContent = spot.title;
      document.getElementById('projection-desc').textContent = spot.desc || '등록된 설명이 없습니다.';

      const indicatorsContainer = document.getElementById('projection-indicators');
      indicatorsContainer.innerHTML = '';
      if (currentProjectionImages.length > 1) {
        for (let i = 0; i < currentProjectionImages.length; i++) {
          const dot = document.createElement('div');
          dot.className = `w-1.5 h-1.5 rounded-full ${i === currentProjectionIndex ? 'bg-white' : 'bg-white/30'}`;
          indicatorsContainer.appendChild(dot);
        }
      }
    }

    function prevProjectionSlide(e) {
      e.stopPropagation();
      if (currentProjectionImages.length <= 1) return;
      currentProjectionIndex = (currentProjectionIndex - 1 + currentProjectionImages.length) % currentProjectionImages.length;
      
      const currentSeatCode = document.getElementById('projection-movie-badge').textContent.match(/\(좌석 (\d+)\)/)[1];
      const matchSpot = filmingLocations.find(loc => loc.director === selectedTheaterDirectorName && loc.seat === currentSeatCode);
      if(matchSpot) updateProjectionView(matchSpot);
    }

    function nextProjectionSlide(e) {
      e.stopPropagation();
      if (currentProjectionImages.length <= 1) return;
      currentProjectionIndex = (currentProjectionIndex + 1) % currentProjectionImages.length;
      
      const currentSeatCode = document.getElementById('projection-movie-badge').textContent.match(/\(좌석 (\d+)\)/)[1];
      const matchSpot = filmingLocations.find(loc => loc.director === selectedTheaterDirectorName && loc.seat === currentSeatCode);
      if(matchSpot) updateProjectionView(matchSpot);
    }

    // 빈 좌석 클릭 시 플로팅 버튼 노출 로직
    function bookEmptySeat(directorName, seatCode) {
      document.querySelectorAll('.empty-seat-selected').forEach(el => {
        el.classList.remove('empty-seat-selected', 'ring-2', 'ring-indigo-400', 'bg-zinc-700');
        el.classList.add('bg-zinc-800');
      });

      const currentSeatBtn = document.getElementById(`seat-btn-${seatCode}`);
      if (currentSeatBtn) {
        currentSeatBtn.classList.add('empty-seat-selected', 'ring-2', 'ring-indigo-400', 'bg-zinc-700');
        currentSeatBtn.classList.remove('bg-zinc-800');
      }

      const floatingBar = document.getElementById('floating-booking-bar');
      const floatingBtn = document.getElementById('floating-book-btn');
      const floatingText = document.getElementById('floating-book-text');
      
      floatingText.textContent = `${seatCode}번 좌석 예매하기`;
      floatingBar.classList.remove('hidden');

      floatingBtn.onclick = () => {
        floatingBar.classList.add('hidden');
        openAddLocationPage();
        document.getElementById('form-director').value = directorName;
        document.getElementById('form-seat').value = seatCode;
      };
    }

    // 메인 페이지 전환 로직 (컷발견 제거)
    function switchPage(pageId) {
      if (pageId === 'add' || pageId === 'theater-booking') {
        document.getElementById('app-bottom-nav').classList.add('hidden'); 
      } else {
        document.getElementById('app-bottom-nav').classList.remove('hidden'); 
      }

      if (pageId === 'add') {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-add-location').classList.remove('hidden');
        return;
      }

      document.getElementById('page-add-location').classList.add('hidden');
      document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');

      const navTheater = document.getElementById('nav-theater');
      const navSpectator = document.getElementById('nav-spectator');
      const navMyCine = document.getElementById('nav-mycine');

      navTheater.classList.add('text-gray-400'); navTheater.classList.remove('text-indigo-600');
      navSpectator.classList.add('text-gray-400'); navSpectator.classList.remove('text-indigo-600');
      navMyCine.classList.add('text-gray-400'); navMyCine.classList.remove('text-indigo-600');

      if (pageId === 'theater') {
        navTheater.classList.add('text-indigo-600');
        navTheater.classList.remove('text-gray-400');
      } else if (pageId === 'spectator') {
        navSpectator.classList.add('text-indigo-600');
        navSpectator.classList.remove('text-gray-400');
        renderBookshelf();
      } else if (pageId === 'mycine') {
        navMyCine.classList.add('text-indigo-600');
        navMyCine.classList.remove('text-gray-400');
        renderMyCineArchive(); 
      }
    }

    function switchTheaterTab(tabId) {
      document.querySelectorAll('.theater-tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600');
        btn.classList.add('border-transparent', 'text-gray-400');
      });

      const activeBtn = document.getElementById(`tab-${tabId}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-gray-400');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
      }

      document.querySelectorAll('.theater-tab-content').forEach(c => c.classList.add('hidden'));
      const activeContent = document.getElementById(`content-${tabId}`);
      if (activeContent) {
        activeContent.classList.remove('hidden');
      }
    }

    function openAddDirectorModal() {
      document.getElementById('add-director-modal').classList.remove('hidden');
      document.getElementById('form-dir-name').value = '';
      document.getElementById('form-dir-emoji').value = '👤';
      lucide.createIcons();
    }

    function closeAddDirectorModal() { document.getElementById('add-director-modal').classList.add('hidden'); }

    function handleNewDirectorSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('form-dir-name').value.trim();
      let emoji = document.getElementById('form-dir-emoji').value.trim();
      if (!emoji) emoji = '👤';

      if (directorsList.some(d => d.name.toLowerCase() === name.toLowerCase())) {
        showToast("이미 등록되어 있는 감독입니다.");
        return;
      }

      const newDir = {
        id: `dir-${Date.now()}`,
        name: name,
        shortName: name.length > 5 ? name.substring(0, 4) + '..' : name,
        emoji: emoji
      };

      directorsList.push(newDir);
      saveDirectorsToStorage();
      renderBookshelf();
      closeAddDirectorModal();
      showToast(`'${name}' 감독이 추가되었습니다!`);
    }

    function handleDirectorAutoSuggest(value) {
      const dropdown = document.getElementById('dir-suggest-dropdown');
      const inputVal = value.trim().toLowerCase();

      if (!inputVal) {
        dropdown.innerHTML = '';
        dropdown.classList.add('hidden');
        return;
      }

      const matches = directorsList.filter(d => d.name.toLowerCase().includes(inputVal));

      if (matches.length === 0) {
        dropdown.innerHTML = '';
        dropdown.classList.add('hidden');
        return;
      }

      dropdown.innerHTML = '';
      matches.forEach(dir => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = "w-full text-left px-4 py-2.5 text-xs text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors font-semibold flex items-center gap-1.5 border-b border-zinc-50 last:border-0";
        item.onclick = () => {
          document.getElementById('form-director').value = dir.name;
          dropdown.innerHTML = '';
          dropdown.classList.add('hidden');
        };
        item.innerHTML = `<span>${dir.emoji || '👤'}</span> ${dir.name}`;
        dropdown.appendChild(item);
      });
      dropdown.classList.remove('hidden');
    }

    function handleMyCineSearch(val) { renderMyCineArchive(val.trim()); }

    // 마이CINE 티켓형 디자인 렌더링
    function renderMyCineArchive(filterQuery = '') {
      const container = document.getElementById('mycine-list-container');
      const countLabel = document.getElementById('mycine-count');
      if (!container) return;

      const listData = filmingLocations.filter(loc => {
        if (!filterQuery) return true;
        return loc.movie.toLowerCase().includes(filterQuery.toLowerCase());
      });

      countLabel.textContent = `총 ${listData.length}개`;

      if (listData.length === 0) {
        container.innerHTML = `
          <div class="h-60 flex flex-col items-center justify-center text-center text-gray-400 gap-2">
            <i data-lucide="ticket" class="w-8 h-8 text-gray-300"></i>
            <p class="text-xs font-bold">발권된 티켓 내역이 없습니다</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      container.innerHTML = '';
      listData.forEach(loc => {
        const thumbnail = loc.stillCuts?.[0] || 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400&auto=format&fit=crop';
        const card = document.createElement('div');
        
        // 티켓 모양의 CSS 구조 적용
        card.className = "bg-white rounded-xl shadow-sm overflow-hidden flex relative border border-zinc-200 cursor-pointer hover:shadow-md transition-all active:scale-[0.99] mb-4 h-28";
        card.onclick = () => openMyCineDetailPage(loc);
        
        card.innerHTML = `
          <div class="w-24 shrink-0 bg-zinc-900 relative border-r-2 border-dashed border-zinc-200">
            <img src="${thumbnail}" class="w-full h-full object-cover opacity-90" />
          </div>
          
          <div class="absolute left-24 top-0 -mt-2 -ml-2 w-4 h-4 bg-zinc-50 rounded-full border border-zinc-200 z-10"></div>
          <div class="absolute left-24 bottom-0 -mb-2 -ml-2 w-4 h-4 bg-zinc-50 rounded-full border border-zinc-200 z-10"></div>
          
          <div class="flex-1 p-3 py-2 flex flex-col justify-center bg-amber-50/10">
             <div class="flex items-center gap-1.5 mb-1">
                <span class="text-[9px] bg-indigo-50 text-indigo-600 font-extrabold px-1.5 py-0.5 rounded-sm uppercase border border-indigo-100">${loc.movie}</span>
                <span class="text-[9px] text-zinc-500 font-bold px-1.5 py-0.5 border border-zinc-200 rounded-sm bg-white">${loc.director || '미지정'}</span>
             </div>
             <h4 class="text-sm font-black text-gray-900 truncate">${loc.title}</h4>
             <div class="mt-auto flex items-center justify-between border-t border-zinc-200 pt-1.5">
                <span class="text-[10px] text-zinc-400 font-mono tracking-widest">${loc.seat ? `SEAT ${loc.seat}` : 'NO SEAT'}</span>
                <i data-lucide="ticket" class="w-3.5 h-3.5 text-zinc-400"></i>
             </div>
          </div>
        `;
        container.appendChild(card);
      });
      lucide.createIcons();
    }

    function openMyCineDetailPage(loc) {
      switchPage('mycine-detail');
      document.getElementById('mydetail-movie').textContent = loc.movie;
      document.getElementById('mydetail-director').textContent = `감독: ${loc.director || "미지정"}`;
      document.getElementById('mydetail-title').textContent = loc.title;
      document.getElementById('mydetail-desc').textContent = loc.desc || '설명 없음';

      const deletePageBtn = document.getElementById('btn-delete-spot-page');
      deletePageBtn.onclick = () => {
        showCustomConfirm("기록 삭제", `'${loc.title}' 기록을 영구 삭제하시겠습니까?`, () => {
            filmingLocations = filmingLocations.filter(item => item.id !== loc.id);
            saveLocationsToStorage();
            switchPage('mycine');
            showToast("삭제가 완료되었습니다.");
          });
      };

      const editBtn = document.getElementById('btn-edit-spot-page');
      editBtn.onclick = () => openEditLocationPage(loc);

      const stillGallery = document.getElementById('mydetail-still-gallery');
      stillGallery.innerHTML = '';
      if (loc.stillCuts && loc.stillCuts.length > 0) {
        loc.stillCuts.forEach(img => {
          const div = document.createElement('div');
          div.className = "flex-shrink-0 w-40 h-28 rounded-2xl overflow-hidden border snap-center";
          div.innerHTML = `<img src="${img}" class="w-full h-full object-cover cursor-zoom-in" onclick="viewFullImage('${img}')" />`;
          stillGallery.appendChild(div);
        });
      } else {
        stillGallery.innerHTML = `<p class="text-xs text-zinc-400 p-2">업로드 이미지 없음</p>`;
      }

      const realGallery = document.getElementById('mydetail-real-gallery');
      realGallery.innerHTML = '';
      if (loc.realPhotos && loc.realPhotos.length > 0) {
        loc.realPhotos.forEach(img => {
          const div = document.createElement('div');
          div.className = "flex-shrink-0 w-40 h-28 rounded-2xl overflow-hidden border snap-center";
          div.innerHTML = `<img src="${img}" class="w-full h-full object-cover cursor-zoom-in" onclick="viewFullImage('${img}')" />`;
          realGallery.appendChild(div);
        });
      } else {
        realGallery.innerHTML = `<p class="text-xs text-zinc-400 p-2">업로드 이미지 없음</p>`;
      }
      setTimeout(() => lucide.createIcons(), 50);
    }

    function openEditLocationPage(loc) {
      switchPage('add'); 
      document.getElementById('form-page-header-title').innerHTML = `
        <i data-lucide="edit" class="w-5 h-5 text-indigo-600"></i> 기록 수정하기
      `;
      document.getElementById('form-edit-id').value = loc.id;
      document.getElementById('form-movie').value = loc.movie;
      document.getElementById('form-director').value = loc.director || "";
      document.getElementById('form-title').value = loc.title;
      document.getElementById('form-desc').value = loc.desc;
      document.getElementById('form-seat').value = loc.seat || "";

      currentStillCutsBase64 = [...(loc.stillCuts || [])];
      currentRealPhotosBase64 = [...(loc.realPhotos || [])];

      renderBase64Previews('preview-still-container', currentStillCutsBase64, true);
      renderBase64Previews('preview-real-container', currentRealPhotosBase64, false);
      setTimeout(() => lucide.createIcons(), 50);
    }

    function renderBase64Previews(containerId, dataArray, isStill) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      dataArray.forEach(base64Data => {
        const card = document.createElement('div');
        card.className = "relative rounded-xl overflow-hidden flex-shrink-0 w-20 h-20 border shadow-sm";
        card.innerHTML = `
          <img class="w-full h-full object-cover" src="${base64Data}">
          <button type="button" onclick="this.parentElement.remove(); removeBase64('${base64Data}', ${isStill})" class="absolute top-1 right-1 bg-black/60 hover:bg-black/80 text-white rounded-full p-0.5 transition-colors">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        `;
        container.appendChild(card);
      });
    }

    function openAddLocationPage() {
      switchPage('add'); 
      document.getElementById('form-page-header-title').innerHTML = `
        <i data-lucide="clapperboard" class="w-5 h-5 text-indigo-600"></i> 나만의 기록 추가
      `;
      currentStillCutsBase64 = [];
      currentRealPhotosBase64 = [];
      document.getElementById('preview-still-container').innerHTML = '';
      document.getElementById('preview-real-container').innerHTML = '';
      document.getElementById('add-location-form').reset();
      document.getElementById('form-edit-id').value = ""; 
      document.getElementById('form-seat').value = ""; 
      setTimeout(() => lucide.createIcons(), 50);
    }

    function closeAddLocationPage() {
      const editId = document.getElementById('form-edit-id').value;
      const seatCode = document.getElementById('form-seat').value;

      if (editId) { switchPage('mycine'); } 
      else if (seatCode) { switchPage('theater-booking'); } 
      else { switchPage('spectator'); }
    }

    function previewMultipleImages(input, containerId) {
      const container = document.getElementById(containerId);
      const files = Array.from(input.files);
      const isStill = containerId.includes('still');

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64Data = e.target.result;
          if (isStill) currentStillCutsBase64.push(base64Data);
          else currentRealPhotosBase64.push(base64Data);

          const card = document.createElement('div');
          card.className = "relative rounded-xl overflow-hidden flex-shrink-0 w-20 h-20 border shadow-sm bg-zinc-900";
          card.innerHTML = `
            <img class="w-full h-full object-cover" src="${base64Data}">
            <button type="button" onclick="this.parentElement.remove(); removeBase64('${base64Data}', ${isStill})" class="absolute top-1 right-1 bg-black/60 hover:bg-black/80 text-white rounded-full p-0.5 transition-colors">
              <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
          `;
          container.appendChild(card);
          lucide.createIcons();
        };
        reader.readAsDataURL(file);
      });
    }

    function removeBase64(data, isStill) {
      if (isStill) currentStillCutsBase64 = currentStillCutsBase64.filter(item => item !== data);
      else currentRealPhotosBase64 = currentRealPhotosBase64.filter(item => item !== data);
    }

    function triggerFormSubmit() {
      const form = document.getElementById('add-location-form');
      if (form.reportValidity()) {
        form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
      }
    }

    function handleNewLocationSubmit(e) {
      e.preventDefault();

      const editId = document.getElementById('form-edit-id').value;
      const seatCode = document.getElementById('form-seat').value;

      const movie = document.getElementById('form-movie').value.trim();
      const director = document.getElementById('form-director').value.trim();
      
      const title = document.getElementById('form-title').value.trim() || `${movie} 명장면`;
      const desc = document.getElementById('form-desc').value.trim() || '상세 소개 없음';

      let stillCuts = [...currentStillCutsBase64];
      let realPhotos = [...currentRealPhotosBase64];

      if (stillCuts.length === 0) stillCuts.push("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop");
      if (realPhotos.length === 0) realPhotos.push("https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=600&auto=format&fit=crop");

      if (editId) {
        const targetIdx = filmingLocations.findIndex(loc => loc.id === editId);
        if (targetIdx !== -1) {
          filmingLocations[targetIdx] = {
            ...filmingLocations[targetIdx],
            movie, director, title, desc,
            stillCuts, realPhotos
          };
          showToast("아카이브가 성공적으로 수정되었습니다.");
          switchPage('mycine');
        }
      } else {
        const newLoc = {
          id: `loc-custom-${Date.now()}`,
          movie, director, title, desc,
          stillCuts, realPhotos,
          seat: seatCode || null,
          isMine: true // 본인 생성 콘텐츠 표식 추가
        };
        filmingLocations.unshift(newLoc);
        showToast("저장 완료되었습니다!");
      }

      if (director && !directorsList.some(d => d.name.toLowerCase() === director.toLowerCase())) {
        const autoDir = {
          id: `dir-${Date.now()}`,
          name: director,
          shortName: director.length > 5 ? director.substring(0, 4) + '..' : director,
          emoji: '👤'
        };
        directorsList.push(autoDir);
        saveDirectorsToStorage();
      }

      saveLocationsToStorage();
      
      document.getElementById('add-location-form').reset();
      currentStillCutsBase64 = []; currentRealPhotosBase64 = [];
      document.getElementById('preview-still-container').innerHTML = '';
      document.getElementById('preview-real-container').innerHTML = '';

      // 등록 성공 시 바로 시네마 스크린 매칭룸으로 돌아가고, 생성된 좌석을 강제 클릭해 화면에 띄웁니다.
      if (!editId) {
        if (seatCode) {
          switchPage('theater-booking');
          loadTheaterDirectorSeats(director);
          setTimeout(() => {
            const seatBtn = document.getElementById(`seat-btn-${seatCode}`);
            if (seatBtn) seatBtn.click();
          }, 100);
        } else {
          switchPage('spectator');
        }
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.innerText = message;
      toast.classList.remove('opacity-0', 'translate-y-3', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-3', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    function viewFullImage(src) {
      const viewer = document.createElement('div');
      viewer.className = "fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 cursor-zoom-out";
      viewer.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">`;
      viewer.onclick = () => viewer.remove();
      document.body.appendChild(viewer);
    }

    window.onload = function() {
      loadDirectorsFromStorage();
      loadLocationsFromStorage();
      lucide.createIcons();
      switchTheaterTab('ku');
      switchPage('theater');
    }
  </script>
</body>
</html>
