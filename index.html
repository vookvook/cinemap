<!DOCTYPE html>
<html lang="ko" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CineMap - 영화 시간표 & 촬영지 지도</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* iOS 및 모바일 브라우저 터치 미끄러짐 최적화 */
    .scroll-container {
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* 스크롤바 숨기기 스타일 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-zinc-50 h-[100dvh] flex flex-col font-sans overflow-hidden select-none">

  <!-- [메인 콘텐츠 컨테이너] -->
  <main class="flex-1 overflow-hidden relative flex flex-col">

    <!-- ==================== MENU 1: 영화관 시간표 ==================== -->
    <div id="page-theater" class="page-content w-full h-full flex flex-col overflow-hidden">
      <!-- 상단 영화관 서브 탭 버튼 영역 -->
      <div class="bg-white border-b shrink-0">
        <div class="flex overflow-x-auto whitespace-nowrap scrollbar-none px-2" id="theater-tab-container">
          <button onclick="switchTheaterTab('ku')" id="tab-ku" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-all">
            KU 시네마
          </button>
          <button onclick="switchTheaterTab('seoul')" id="tab-seoul" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            서울아트시네마
          </button>
          <button onclick="switchTheaterTab('megabox')" id="tab-megabox" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            메가박스 군자
          </button>
          <button onclick="switchTheaterTab('wangcgv')" id="tab-wangcgv" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            왕십리 CGV
          </button>
          <button onclick="switchTheaterTab('laika')" id="tab-laika" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            라이카 시네마
          </button>
        </div>
      </div>

      <!-- 극장 시간표 iframe 본문 영역 -->
      <div class="flex-1 p-3 md:p-4 overflow-hidden flex flex-col">
        <div class="flex-1 relative bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col">
          
          <!-- KU 시네마 -->
          <div id="content-ku" class="theater-tab-content w-full h-full flex-1 scroll-container">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://kucinema.net/timetable/" 
                class="w-[125%] h-[1500px] origin-top-left scale-[1.0] md:scale-[1.2]"
                title="KU Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 서울아트시네마 -->
          <div id="content-seoul" class="theater-tab-content w-full h-full flex-1 scroll-container hidden">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://www.cinematheque.seoul.kr/bbs/content.php?co_id=timetable" 
                class="w-full h-[1500px]"
                title="Seoul Art Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 메가박스 군자 -->
          <div id="content-megabox" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1396259461/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Megabox Gunja Timetable">
            </iframe>
          </div>

          <!-- 왕십리 CGV -->
          <div id="content-wangcgv" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/12964379/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Wangsimni CGV Timetable">
            </iframe>
          </div>

          <!-- 라이카 시네마 -->
          <div id="content-laika" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1156408497/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Laika Cinema Timetable">
            </iframe>
          </div>

        </div>
      </div>
    </div>


    <!-- ==================== MENU 2: 컷발견 (지도 기반 영화 촬영지) ==================== -->
    <div id="page-cut" class="page-content w-full h-full flex flex-col overflow-hidden hidden relative">
      <!-- 지도가 탭 위 전체를 가득 채우는 풀스크린 레이아웃 -->
      <div id="map" class="w-full h-full z-10"></div>

      <!-- 우측 상단 플로팅 + 버튼 (위치정보 없이 빈 모달 열기) -->
      <button onclick="openAddLocationModal(false)" class="absolute top-4 right-4 z-20 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all">
        <i data-lucide="plus" class="w-6 h-6"></i>
      </button>

      <!-- 화면 하단 중앙 플로팅 '컷 저장하기' 버튼 (지도를 탭해 임시 마커가 생겼을 때만 노출) -->
      <div id="save-cut-float-container" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 transition-all duration-300 transform scale-0 pointer-events-none">
        <button onclick="openAddLocationModal(true)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold py-3.5 px-6 rounded-full shadow-2xl flex items-center gap-2 text-sm whitespace-nowrap pointer-events-auto">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
          <span id="floating-btn-text">이 위치에 컷 저장하기</span>
        </button>
      </div>

      <!-- 촬영지 상세 정보 슬라이드 서랍 (Bottom Sheet) -->
      <div id="detail-drawer" class="absolute bottom-0 left-0 right-0 bg-white border-t rounded-t-3xl shadow-2xl z-30 transition-all duration-300 transform translate-y-full flex flex-col max-h-[50vh]">
        <!-- 드래그 핸들 데코레이션 -->
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto my-3 shrink-0"></div>
        
        <div class="overflow-y-auto px-5 pb-6">
          <div class="flex justify-between items-start gap-4">
            <div>
              <span id="detail-movie" class="bg-indigo-50 text-indigo-600 text-xs font-extrabold px-2.5 py-1 rounded-full uppercase tracking-wider"></span>
              <h3 id="detail-title" class="text-lg font-black text-gray-900 mt-2"></h3>
              <p id="detail-addr-label" class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                <span id="detail-address"></span>
              </p>
            </div>
            <button onclick="closeDetailDrawer()" class="p-1 hover:bg-gray-100 rounded-full transition-colors text-gray-400 hover:text-gray-600">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>

          <!-- 사진 비교 영역 (2분할) -->
          <div class="grid grid-cols-2 gap-3 mt-4">
            <div class="relative rounded-xl overflow-hidden border border-gray-100 shadow-sm">
              <img id="detail-still" class="w-full h-32 object-cover bg-gray-50" src="" alt="영화 속 장면">
              <span class="absolute bottom-1.5 right-1.5 bg-black/60 text-white text-[9px] px-1.5 py-0.5 rounded font-medium">영화 속 장면</span>
            </div>
            <div class="relative rounded-xl overflow-hidden border border-gray-100 shadow-sm">
              <img id="detail-real" class="w-full h-32 object-cover bg-gray-50" src="" alt="실제 현장 사진">
              <span class="absolute bottom-1.5 right-1.5 bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded font-medium">실제 현장</span>
            </div>
          </div>

          <!-- 상세 설명 설명글 -->
          <div class="bg-zinc-50 rounded-xl p-3.5 border border-zinc-100 mt-4">
            <span class="text-xs font-bold text-gray-400 block mb-1">상세 현장 정보</span>
            <p id="detail-desc" class="text-sm text-gray-700 leading-relaxed"></p>
          </div>
        </div>
      </div>

    </div>

  </main>

  <!-- [하단 앱 고정 네비게이션 탭바] -->
  <nav class="bg-white border-t shrink-0 z-50 shadow-lg">
    <div class="flex h-16 justify-around items-center">
      <!-- 탭 1: 영화관 -->
      <button onclick="switchPage('theater')" id="nav-theater" class="flex flex-col items-center justify-center w-full h-full text-indigo-600 transition-colors">
        <i data-lucide="film" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">영화관</span>
      </button>
      <!-- 탭 2: 컷발견 -->
      <button onclick="switchPage('cut')" id="nav-cut" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-indigo-600 transition-colors">
        <i data-lucide="map-pin" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">컷발견</span>
      </button>
    </div>
  </nav>

  <!-- ==================== 촬영지 추가용 커스텀 모달 다이얼로그 ==================== -->
  <div id="add-location-modal" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <!-- 모달 헤더 -->
      <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shrink-0">
        <h3 class="font-black text-lg flex items-center gap-1.5">
          <i data-lucide="plus-circle" class="w-5 h-5"></i>
          나만의 촬영지 등록
        </h3>
        <button onclick="closeAddLocationModal()" class="p-1 hover:bg-indigo-700 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- 모달 폼 -->
      <form id="add-location-form" onsubmit="handleNewLocationSubmit(event)" class="p-5 overflow-y-auto flex-1 space-y-4 scrollbar-none">
        
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">촬영지 한글 주소</label>
          <div class="relative">
            <input type="text" id="form-address" required class="w-full border border-gray-200 px-3 py-2.5 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 bg-gray-50 focus:bg-white transition-colors" placeholder="예: 서울특별시 마포구 아현동 30">
            <!-- 임시 숨김 처리용 위도 경도 -->
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">
          </div>
          <p class="text-[10px] text-gray-400 mt-1">※ 지도 클릭 등록 시 주소가 자동 조회되며, 필요시 직접 편집할 수 있습니다.</p>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">영화 제목</label>
          <input type="text" id="form-movie" required class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="예: 기생충">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">촬영 장소명</label>
          <input type="text" id="form-title" required class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="예: 돼지쌀슈퍼">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">촬영지 이야기</label>
          <textarea id="form-desc" required rows="2" class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="이 장면에 대한 추억이나 상세 소개를 작성해 주세요."></textarea>
        </div>

        <!-- 이미지 수동 업로드 (Local File 및 Preview) -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">① 영화 속 명장면</label>
            <div class="border border-dashed rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-24">
              <input type="file" id="form-still-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this, 'preview-still')">
              <div id="preview-still-placeholder" class="text-center text-gray-400">
                <i data-lucide="image" class="w-5 h-5 mx-auto mb-1"></i>
                <span class="text-[10px]">사진 등록</span>
              </div>
              <img id="preview-still" class="absolute inset-0 w-full h-full object-cover rounded-lg hidden" alt="스틸컷 프리뷰">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">② 내가 찍은 실제 사진</label>
            <div class="border border-dashed rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-24">
              <input type="file" id="form-real-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this, 'preview-real')">
              <div id="preview-real-placeholder" class="text-center text-gray-400">
                <i data-lucide="image" class="w-5 h-5 mx-auto mb-1"></i>
                <span class="text-[10px]">사진 등록</span>
              </div>
              <img id="preview-real" class="absolute inset-0 w-full h-full object-cover rounded-lg hidden" alt="실제사진 프리뷰">
            </div>
          </div>
        </div>

        <!-- 등록 버튼 -->
        <div class="pt-2 flex gap-2">
          <button type="button" onclick="closeAddLocationModal()" class="w-1/3 border font-bold py-2.5 rounded-xl text-gray-600 text-sm hover:bg-gray-50 transition-colors">취소</button>
          <button type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors shadow-md">기록 저장하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 토스트 알림창 -->
  <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-zinc-900 text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-xl opacity-0 translate-y-3 pointer-events-none transition-all duration-300 z-[110] flex items-center gap-1.5">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span id="toast-message">저장 완료!</span>
  </div>

  <!-- [메인 클라이언트 비즈니스 스크립트] -->
  <script>
    // 1. 촬영지 마커 데이터셋 (클래식, 괴물, 기생충을 지워달라고 하셔서 완전히 빈 배열로 시작)
    let filmingLocations = [];

    let map = null;
    let markersGroup = null;
    let clickMarker = null; // 사용자가 맵을 탭하여 지정한 임시 핀 마커
    let lastClickedCoords = null; // 저장용 임시 좌표 저장 변수
    let lastClickedAddressText = ""; // 검색된 주소값 임시 저장용

    // 2. 메인 페이지 메뉴 전환 함수 (하단 내비게이션 바)
    function switchPage(pageId) {
      // 모든 페이지 감추기
      document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
      // 선택한 페이지 표시
      document.getElementById(`page-${pageId}`).classList.remove('hidden');

      // 하단 탭 버튼 강조 전환
      const navTheater = document.getElementById('nav-theater');
      const navCut = document.getElementById('nav-cut');

      if (pageId === 'theater') {
        navTheater.classList.add('text-indigo-600');
        navTheater.classList.remove('text-gray-400');
        navCut.classList.add('text-gray-400');
        navCut.classList.remove('text-indigo-600');
        closeDetailDrawer();
      } else if (pageId === 'cut') {
        navCut.classList.add('text-indigo-600');
        navCut.classList.remove('text-gray-400');
        navTheater.classList.add('text-gray-400');
        navTheater.classList.remove('text-indigo-600');
        
        // 지도가 숨겨져있던 탭에서 활성화될 때 레이아웃 왜곡 깨짐 방지
        setTimeout(() => {
          if (!map) {
            initMap();
          } else {
            map.invalidateSize();
          }
        }, 100);
      }
    }

    // 3. 극장 서브 탭 전환 함수 (기존 극장 시간표 기능)
    function switchTheaterTab(tabId) {
      // 극장 서브 탭 버튼 스타일 초기화
      document.querySelectorAll('.theater-tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600');
        btn.classList.add('border-transparent', 'text-gray-400');
      });

      // 선택 탭 활성화
      const activeBtn = document.getElementById(`tab-${tabId}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-gray-400');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
      }

      // 모든 시간표 뷰 가리고 활성화된 극장만 보이기
      document.querySelectorAll('.theater-tab-content').forEach(c => c.classList.add('hidden'));
      const activeContent = document.getElementById(`content-${tabId}`);
      if (activeContent) {
        activeContent.classList.remove('hidden');
      }
    }

    // 4. 지도 초기화 및 마커 렌더링
    function initMap() {
      // 서울 중심 좌표
      map = L.map('map', {
        zoomControl: false 
      }).setView([37.5665, 126.9780], 12);

      // 한글 레이블이 깔끔하게 잘 나오는 CartoDB Voyager 타일셋 적용
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB &copy; OpenStreetMap'
      }).addTo(map);

      // 줌 컨트롤 우측 하단 배치
      L.control.zoom({ position: 'bottomright' }).addTo(map);

      markersGroup = L.layerGroup().addTo(map);

      // 지도 클릭(터치) 시 임시 핀 꽂기 및 컷저장 플로팅 버튼 출력
      map.on('click', function(e) {
        // 기존 상세서랍 열려있으면 닫기
        closeDetailDrawer();

        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        lastClickedCoords = e.latlng;

        // 임시 핀 생성/이동
        if (clickMarker) {
          clickMarker.setLatLng(e.latlng);
        } else {
          const selectIcon = L.divIcon({
            className: 'custom-marker-select',
            html: `
              <div class="relative flex items-center justify-center">
                <span class="animate-ping absolute inline-flex h-8 w-8 rounded-full bg-emerald-400 opacity-75"></span>
                <div class="bg-emerald-500 border-2 border-white w-7 h-7 rounded-full shadow-xl flex items-center justify-center relative">
                  <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                </div>
              </div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          clickMarker = L.marker(e.latlng, { icon: selectIcon }).addTo(map);
        }

        // '컷 저장하기' 플로팅 버튼 나타나기
        const floatBtn = document.getElementById('save-cut-float-container');
        floatBtn.classList.remove('scale-0', 'pointer-events-none');
        floatBtn.classList.add('scale-100', 'pointer-events-auto');

        // 실시간 한글 주소 변환(역지오코딩) 시작
        fetchAddressFromCoords(lat, lng);
      });

      // 지도가 이동되거나 축소/확대될 경우 임시 핀과 플로팅 버튼을 미노출 처리
      map.on('movestart zoomstart dragstart', function() {
        hideTempMarkerAndButton();
      });

      // 등록된 마커들 렌더링
      renderMarkers();
    }

    // 4-1. OpenStreetMap Nominatim 기반 역지오코딩 비동기 호출 함수
    async function fetchAddressFromCoords(lat, lng) {
      const btnText = document.getElementById('floating-btn-text');
      btnText.innerHTML = `<span class="flex items-center gap-1"><i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 주소 분석 중...</span>`;
      lucide.createIcons();

      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=ko`);
        if (!response.ok) throw new Error("API call limit or network issue");
        const data = await response.json();
        
        // 데이터 구조에서 한국 주소 포맷 구성
        const addr = data.address;
        if (addr) {
          const province = addr.province || addr.city || '';
          const district = addr.borough || addr.city_district || addr.county || '';
          const suburb = addr.suburb || addr.neighbourhood || addr.village || '';
          const road = addr.road || '';
          const houseNumber = addr.house_number || '';

          let addressResult = '';
          if (province && province !== district) addressResult += province + ' ';
          if (district) addressResult += district + ' ';
          if (suburb) addressResult += suburb + ' ';
          if (road) addressResult += road + ' ';
          if (houseNumber) addressResult += houseNumber;

          lastClickedAddressText = addressResult.trim() || data.display_name || "주소 찾기 성공";
        } else {
          lastClickedAddressText = data.display_name || "지정된 주소";
        }

        btnText.innerHTML = `<i data-lucide="map-pin" class="w-4 h-4 inline mr-1"></i> [${lastClickedAddressText.substring(0, 15)}...] 컷 저장`;
        lucide.createIcons();
      } catch (err) {
        console.warn("Reverse geocoding issue: ", err);
        lastClickedAddressText = "서울 인근 주소";
        btnText.innerHTML = `<i data-lucide="map-pin" class="w-4 h-4 inline mr-1"></i> 이 위치에 컷 저장하기`;
        lucide.createIcons();
      }
    }

    // 임시 핀과 플로팅 버튼 지우기 함수
    function hideTempMarkerAndButton() {
      if (clickMarker) {
        map.removeLayer(clickMarker);
        clickMarker = null;
      }
      lastClickedCoords = null;
      const floatBtn = document.getElementById('save-cut-float-container');
      floatBtn.classList.add('scale-0', 'pointer-events-none');
      floatBtn.classList.remove('scale-100', 'pointer-events-auto');
    }

    // 5. 마커 그리기 함수 (등록 완료된 촬영지 핀)
    function renderMarkers() {
      if (!markersGroup) return;
      markersGroup.clearLayers();

      filmingLocations.forEach(loc => {
        const pinIcon = L.divIcon({
          className: 'custom-marker-wrapper',
          html: `<div class="bg-indigo-600 hover:bg-indigo-800 border-2 border-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center transition-all transform hover:scale-110 active:scale-95 text-white"><i data-lucide="camera" class="w-4 h-4"></i></div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });

        const marker = L.marker([loc.lat, loc.lng], { icon: pinIcon });
        
        // 등록 마커 클릭 시 하단 슬라이드 상세 서랍 노출
        marker.on('click', (e) => {
          L.DomEvent.stopPropagation(e);
          hideTempMarkerAndButton(); // 임시 지정 핀은 지움
          showLocationDetails(loc);
        });

        markersGroup.addLayer(marker);
      });
      
      setTimeout(() => lucide.createIcons(), 50);
    }

    // 6. 촬영지 상세 서랍(Bottom Sheet) 열기
    function showLocationDetails(loc) {
      document.getElementById('detail-movie').innerText = loc.movie;
      document.getElementById('detail-title').innerText = loc.title;
      document.getElementById('detail-desc').innerText = loc.desc;
      document.getElementById('detail-address').innerText = loc.address || "등록된 주소 정보 없음";
      
      // 이미지 소스 맵핑
      document.getElementById('detail-still').src = loc.stillCut;
      document.getElementById('detail-real').src = loc.realPhoto;

      const drawer = document.getElementById('detail-drawer');
      drawer.classList.remove('translate-y-full');
      drawer.classList.add('translate-y-0');
    }

    // 촬영지 상세 서랍 닫기
    function closeDetailDrawer() {
      const drawer = document.getElementById('detail-drawer');
      drawer.classList.remove('translate-y-0');
      drawer.classList.add('translate-y-full');
    }

    // 7. 촬영지 등록 모달 관리
    function openAddLocationModal(hasLocation) {
      document.getElementById('add-location-modal').classList.remove('hidden');
      
      const latField = document.getElementById('form-lat');
      const lngField = document.getElementById('form-lng');
      const addrField = document.getElementById('form-address');

      if (hasLocation && lastClickedCoords) {
        // 지도 핀 지정을 통해 들어온 경우 위치 정보 주입
        latField.value = lastClickedCoords.lat.toFixed(7);
        lngField.value = lastClickedCoords.lng.toFixed(7);
        addrField.value = lastClickedAddressText; // 분석된 한글 주소 자동 입력
      } else {
        // 우측 상단 + 버튼 등을 통해 직접 들어온 경우 주소 및 좌표 필드를 초기 비움
        latField.value = "";
        lngField.value = "";
        addrField.value = "";
      }

      setTimeout(() => lucide.createIcons(), 50);
    }

    function closeAddLocationModal() {
      document.getElementById('add-location-modal').classList.add('hidden');
      hideTempMarkerAndButton();
    }

    // 이미지 파일 첨부 시 인메모리 Blob URL 생성하여 프리뷰 보기
    function previewImage(input, previewId) {
      const file = input.files[0];
      const previewImg = document.getElementById(previewId);
      const placeholder = document.getElementById(`${previewId}-placeholder`);

      if (file) {
        const objectUrl = URL.createObjectURL(file);
        previewImg.src = objectUrl;
        previewImg.classList.remove('hidden');
        placeholder.classList.add('hidden');
      }
    }

    // 8. 촬영지 제출 폼 처리
    function handleNewLocationSubmit(e) {
      e.preventDefault();

      let latVal = document.getElementById('form-lat').value;
      let lngVal = document.getElementById('form-lng').value;
      
      // 위치 지정이 안되어있을 경우 임시로 현재 지도 중심 위치로 매핑하여 저장 실패를 방지함
      if (!latVal || !lngVal) {
        const center = map.getCenter();
        latVal = center.lat;
        lngVal = center.lng;
      } else {
        latVal = parseFloat(latVal);
        lngVal = parseFloat(lngVal);
      }

      const movie = document.getElementById('form-movie').value;
      const title = document.getElementById('form-title').value;
      const desc = document.getElementById('form-desc').value;
      const address = document.getElementById('form-address').value;

      // 업로드 이미지 체크 (미지정 시 영화 감성 테마 고해상도 이미지 플레이스홀더 제공)
      let stillCut = document.getElementById('preview-still').src;
      let realPhoto = document.getElementById('preview-real').src;

      if (!stillCut || stillCut.includes(window.location.host) === false) {
        stillCut = "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop";
      }
      if (!realPhoto || realPhoto.includes(window.location.host) === false) {
        realPhoto = "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=600&auto=format&fit=crop";
      }

      // 새 촬영지 오브젝트 생성 및 최상단 저장
      const newLoc = {
        id: `loc-${Date.now()}`,
        movie,
        title,
        desc,
        address,
        lat: latVal,
        lng: lngVal,
        stillCut,
        realPhoto
      };

      filmingLocations.unshift(newLoc);

      // 지도 마커 새로고침 및 등록된 위치로 지도 뷰 자동 이동
      renderMarkers();
      map.flyTo([latVal, lngVal], 14);

      // 폼 리셋 및 UI 초기화
      document.getElementById('add-location-form').reset();
      document.getElementById('preview-still').classList.add('hidden');
      document.getElementById('preview-still').src = '';
      document.getElementById('preview-still-placeholder').classList.remove('hidden');
      document.getElementById('preview-real').classList.add('hidden');
      document.getElementById('preview-real').src = '';
      document.getElementById('preview-real-placeholder').classList.remove('hidden');

      closeAddLocationModal();
      showToast("내 지도에 촬영지가 성공적으로 기록되었습니다!");
      
      // 등록된 장소 상세 서랍 바로 보여주기
      setTimeout(() => {
        showLocationDetails(newLoc);
      }, 500);
    }

    // 9. 알림용 토스트 팝업 함수
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.innerText = message;

      toast.classList.remove('opacity-0', 'translate-y-3', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-3', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    // 초기 실행
    window.onload = function() {
      lucide.createIcons();
      switchTheaterTab('ku');
      switchPage('theater');
    }
  </script>
