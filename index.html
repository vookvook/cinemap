<!DOCTYPE html>
<html lang="ko" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CineMap - 영화 시간표 & 촬영지 지도</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Google Open Location Code (Plus Code) Decoder library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openlocationcode/1.0.4/openlocationcode.min.js"></script>

  <style>
    /* iOS 및 모바일 브라우저 터치 미끄러짐 최적화 */
    .scroll-container {
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* 스크롤바 숨기기 스타일 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 지도 마커 커스텀 바운스 애니메이션 */
    .marker-bounce {
      animation: pinBounce 0.6s ease-out alternate infinite;
    }
    @keyframes pinBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-6px); }
    }
  </style>
</head>
<body class="bg-zinc-50 h-[100dvh] flex flex-col font-sans overflow-hidden select-none">

  <!-- [메인 콘텐츠 컨테이너] -->
  <main class="flex-1 overflow-hidden relative flex flex-col">

    <!-- ==================== MENU 1: 영화관 시간표 ==================== -->
    <div id="page-theater" class="page-content w-full h-full flex flex-col overflow-hidden">
      <!-- 상단 영화관 서브 탭 버튼 영역 -->
      <div class="bg-white border-b shrink-0">
        <div class="flex overflow-x-auto whitespace-nowrap scrollbar-none px-2" id="theater-tab-container">
          <button onclick="switchTheaterTab('ku')" id="tab-ku" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-all">
            KU 시네마
          </button>
          <button onclick="switchTheaterTab('seoul')" id="tab-seoul" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            서울아트시네마
          </button>
          <button onclick="switchTheaterTab('megabox')" id="tab-megabox" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            메가박스 군자
          </button>
          <button onclick="switchTheaterTab('wangcgv')" id="tab-wangcgv" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            왕십리 CGV
          </button>
          <button onclick="switchTheaterTab('laika')" id="tab-laika" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            라이카 시네마
          </button>
        </div>
      </div>

      <!-- 극장 시간표 iframe 본문 영역 -->
      <div class="flex-1 p-3 md:p-4 overflow-hidden flex flex-col">
        <div class="flex-1 relative bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col">
          
          <!-- KU 시네마 -->
          <div id="content-ku" class="theater-tab-content w-full h-full flex-1 scroll-container">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://kucinema.net/timetable/" 
                class="w-[125%] h-[1500px] origin-top-left scale-[1.0] md:scale-[1.2]"
                title="KU Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 서울아트시네마 -->
          <div id="content-seoul" class="theater-tab-content w-full h-full flex-1 scroll-container hidden">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://www.cinematheque.seoul.kr/bbs/content.php?co_id=timetable" 
                class="w-full h-[1500px]"
                title="Seoul Art Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 메가박스 군자 -->
          <div id="content-megabox" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1396259461/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Megabox Gunja Timetable">
            </iframe>
          </div>

          <!-- 왕십리 CGV -->
          <div id="content-wangcgv" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/12964379/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Wangsimni CGV Timetable">
            </iframe>
          </div>

          <!-- 라이카 시네마 -->
          <div id="content-laika" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1156408497/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Laika Cinema Timetable">
            </iframe>
          </div>

        </div>
      </div>
    </div>


    <!-- ==================== MENU 2: 컷발견 (지도 기반 영화 촬영지) ==================== -->
    <div id="page-cut" class="page-content w-full h-full flex flex-col overflow-hidden hidden relative">
      <!-- 지도가 탭 위 전체를 가득 채우는 풀스크린 레이아웃 -->
      <div id="map" class="w-full h-full z-10"></div>

      <!-- 상단 좌측/중앙: 영화 감독 필터 칩 영역 -->
      <div class="absolute top-4 left-4 z-20 flex gap-2 overflow-x-auto scrollbar-none pr-16 max-w-[calc(100vw-80px)]">
        <button id="filter-all" onclick="filterByDirector('all')" class="bg-indigo-600 text-white px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-black transition-all">
          <span>🎬</span> 전체
        </button>
        <button id="filter-almodovar" onclick="filterByDirector('페드로 알모도바르')" class="bg-white text-gray-700 px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-extrabold border border-gray-100 transition-all hover:bg-zinc-50">
          <span>🎨</span> 알모도바르
        </button>
        <button id="filter-park" onclick="filterByDirector('박찬욱')" class="bg-white text-gray-700 px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-extrabold border border-gray-100 transition-all hover:bg-zinc-50">
          <span>🔨</span> 박찬욱
        </button>
        <button id="filter-lynch" onclick="filterByDirector('데이비드 린치')" class="bg-white text-gray-700 px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-extrabold border border-gray-100 transition-all hover:bg-zinc-50">
          <span>🌀</span> 데이비드 린치
        </button>
        <button id="filter-koreeda" onclick="filterByDirector('고레에다 히로카즈')" class="bg-white text-gray-700 px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-extrabold border border-gray-100 transition-all hover:bg-zinc-50">
          <span>🏠</span> 고레에다
        </button>
      </div>

      <!-- 상단 우측: 플로팅 원형 컨트롤 버튼 영역 -->
      <div class="absolute top-4 right-4 z-20 flex flex-col gap-3.5">
        <!-- 등록하기 버튼 (+) -->
        <button onclick="openAddLocationPage(false)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-12 h-12 rounded-full shadow-xl flex items-center justify-center transition-all">
          <i data-lucide="plus" class="w-6 h-6"></i>
        </button>

        <!-- 검색창 토글 버튼 (동그라미 검색 플로팅 버튼 - 인풋필드를 절대 가리지 않는 구조) -->
        <button id="btn-search-toggle" onclick="toggleSearchInput()" class="bg-white hover:bg-zinc-50 active:scale-95 text-gray-700 w-12 h-12 rounded-full shadow-xl flex items-center justify-center border border-zinc-100 transition-all">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- 동적으로 나타나는 미니멀 주소 & 장소 검색바 (검색 버튼 왼쪽에 정확하게 배치되어 버튼을 절대 가리지 않음) -->
      <div id="floating-search-bar" class="absolute top-[78px] right-[76px] left-4 z-20 max-w-sm ml-auto transition-all duration-300 transform scale-x-0 origin-right opacity-0 pointer-events-none">
        <div class="relative flex items-center bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden px-4 py-3">
          <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2 shrink-0"></i>
          <input type="text" id="map-search-input" onkeyup="handleSearchKeyUp(event)" placeholder="주소, 장소 또는 구글 플러스 코드..." class="w-full text-sm focus:outline-none bg-transparent">
          <button onclick="clearSearch()" id="btn-search-clear" class="hidden text-gray-400 hover:text-gray-600 ml-1 shrink-0">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
        <!-- 검색 결과 자동완성 리스트 -->
        <div id="search-results-dropdown" class="absolute left-0 right-0 mt-1.5 bg-white rounded-xl shadow-xl border border-gray-100 max-h-48 overflow-y-auto hidden z-30">
          <!-- 결과 리스트 동적 추가 -->
        </div>
      </div>

      <!-- 화면 하단 중앙 플로팅 '컷 저장하기' 버튼 (아이콘 단 1개만 중복 없이 노출) -->
      <div id="save-cut-float-container" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 transition-all duration-300 transform scale-0 pointer-events-none">
        <button onclick="openAddLocationPage(true)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold py-3.5 px-6 rounded-full shadow-2xl flex items-center gap-2 text-sm whitespace-nowrap pointer-events-auto">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
          <span id="floating-btn-text">이 위치에 컷 저장하기</span>
        </button>
      </div>

      <!-- 촬영지 상세 정보 슬라이드 서랍 (Bottom Sheet) -->
      <div id="detail-drawer" class="absolute bottom-0 left-0 right-0 bg-white border-t rounded-t-3xl shadow-2xl z-30 transition-all duration-300 transform translate-y-full flex flex-col max-h-[55vh]">
        <!-- 드래그 핸들 데코레이션 -->
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto my-3 shrink-0"></div>
        
        <div class="overflow-y-auto px-5 pb-6">
          <div class="flex justify-between items-start gap-4">
            <div class="flex-1">
              <div class="flex flex-wrap items-center gap-2">
                <span id="detail-movie" class="bg-indigo-50 text-indigo-600 text-[11px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider"></span>
                <span id="detail-director" class="bg-zinc-100 text-zinc-600 text-[11px] font-bold px-2 py-1 rounded-full"></span>
              </div>
              <h3 id="detail-title" class="text-lg font-black text-gray-900 mt-2"></h3>
              <p id="detail-addr-label" class="text-xs text-gray-400 mt-1 flex items-center gap-1">
                <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                <span id="detail-address"></span>
              </p>
            </div>
            
            <div class="flex items-center gap-1">
              <!-- 촬영지 개별 삭제 버튼 -->
              <button id="btn-delete-spot" class="p-2 text-rose-500 hover:bg-rose-50 rounded-full transition-colors" title="삭제하기">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
              </button>
              <button onclick="closeDetailDrawer()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <!-- 영화 속 명장면 이미지 슬라이더 (다중) -->
          <div class="mt-4">
            <span class="text-xs font-bold text-gray-400 block mb-1.5">① 영화 속 장면</span>
            <div id="detail-still-gallery" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none snap-x">
              <!-- 스틸 이미지 동적 생성 -->
            </div>
          </div>

          <!-- 실제 촬영 명소 성지순례 이미지 슬라이더 (다중) -->
          <div class="mt-4">
            <span class="text-xs font-bold text-indigo-500 block mb-1.5">② 실제 촬영 명소</span>
            <div id="detail-real-gallery" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none snap-x">
              <!-- 실제 사진 동적 생성 -->
            </div>
          </div>

          <!-- 상세 설명 설명글 -->
          <div class="bg-zinc-50 rounded-xl p-3.5 border border-zinc-100 mt-4">
            <span class="text-xs font-bold text-gray-400 block mb-1">상세 현장 정보</span>
            <p id="detail-desc" class="text-sm text-gray-700 leading-relaxed"></p>
          </div>
        </div>
      </div>

    </div>

    <!-- ==================== PAGE 3: 나만의 촬영지 등록 단독 페이지 ==================== -->
    <div id="page-add-location" class="page-content w-full h-full bg-white z-50 flex flex-col hidden">
      <!-- 페이지 헤더 -->
      <div class="bg-zinc-50 border-b px-4 py-4 shrink-0 flex justify-between items-center">
        <button onclick="closeAddLocationPage()" class="p-1 hover:bg-zinc-200 rounded-full transition-colors flex items-center text-gray-600">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <h3 class="font-black text-md text-gray-900 flex items-center gap-1.5">
          <i data-lucide="camera" class="w-5 h-5 text-indigo-600"></i>
          나만의 명장면 촬영지 기록
        </h3>
        <span class="w-5 h-5"></span> <!-- 간격 맞추기용 더미 -->
      </div>

      <!-- 입력 양식 폼 -->
      <form id="add-location-form" onsubmit="handleNewLocationSubmit(event)" class="p-6 flex-1 overflow-y-auto space-y-5 scrollbar-none">
        
        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1.5">촬영지 한글 주소</label>
          <div class="relative">
            <input type="text" id="form-address" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500 bg-gray-50 focus:bg-white transition-colors" placeholder="예: 일본 교토부 교토시 가미교구">
            <!-- 위도/경도 은닉값 -->
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">
          </div>
          <p class="text-[10px] text-gray-400 mt-1">※ 지도를 터치해 들어온 경우 주소가 자동 추적되며, 수동 작성 및 편집도 가능합니다.</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">영화 제목</label>
            <input type="text" id="form-movie" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="예: 기생충">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">영화 감독</label>
            <input type="text" id="form-director" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="예: 봉준호">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1.5">촬영 장소 명칭</label>
          <input type="text" id="form-title" required class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="예: 돼지쌀슈퍼">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1.5">촬영지 디테일 소개</label>
          <textarea id="form-desc" required rows="3" class="w-full border border-gray-200 px-4 py-3 text-sm rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="이 구도에서 연출된 장면의 의도나 성지순례 당시의 꿀팁 등을 자유롭게 적어주세요."></textarea>
        </div>

        <!-- 이미지 수동 업로드 (여러 장 등록 지원) -->
        <div class="space-y-4">
          <!-- 명장면 다중 수집기 -->
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">① 영화 속 명장면 업로드 (여러 장 가능)</label>
            <div class="border border-dashed border-zinc-200 rounded-xl p-4 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-28 transition-colors">
              <input type="file" id="form-still-file" accept="image/*" multiple class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewMultipleImages(this, 'preview-still-container')">
              <div class="text-center text-gray-400">
                <i data-lucide="image-plus" class="w-6 h-6 mx-auto mb-1 text-gray-400"></i>
                <span class="text-xs">사진 파일들 선택하기</span>
              </div>
            </div>
            <!-- 명장면 이미지 프리뷰 리스트 -->
            <div id="preview-still-container" class="flex gap-2 overflow-x-auto mt-2.5 scrollbar-none"></div>
          </div>

          <!-- 성지순례 다중 수집기 -->
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1.5">② 내가 직접 촬영한 사진 (여러 장 가능)</label>
            <div class="border border-dashed border-zinc-200 rounded-xl p-4 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-28 transition-colors">
              <input type="file" id="form-real-file" accept="image/*" multiple class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewMultipleImages(this, 'preview-real-container')">
              <div class="text-center text-gray-400">
                <i data-lucide="camera" class="w-6 h-6 mx-auto mb-1 text-indigo-400"></i>
                <span class="text-xs">인증 사진들 선택하기</span>
              </div>
            </div>
            <!-- 실제 사진 프리뷰 리스트 -->
            <div id="preview-real-container" class="flex gap-2 overflow-x-auto mt-2.5 scrollbar-none"></div>
          </div>
        </div>

        <!-- 저장/취소 버튼 세트 -->
        <div class="pt-4 flex gap-3">
          <button type="button" onclick="closeAddLocationPage()" class="w-1/3 border border-gray-200 font-bold py-3.5 rounded-xl text-gray-600 text-sm hover:bg-gray-50 transition-colors">취소</button>
          <button type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-sm transition-colors shadow-md">내 지도에 영구 기록</button>
        </div>
      </form>
    </div>

  </main>

  <!-- [하단 앱 고정 네비게이션 탭바] -->
  <nav class="bg-white border-t shrink-0 z-50 shadow-lg">
    <div class="flex h-16 justify-around items-center">
      <!-- 탭 1: 영화관 -->
      <button onclick="switchPage('theater')" id="nav-theater" class="flex flex-col items-center justify-center w-full h-full text-indigo-600 transition-colors">
        <i data-lucide="film" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">영화관</span>
      </button>
      <!-- 탭 2: 컷발견 -->
      <button onclick="switchPage('cut')" id="nav-cut" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-indigo-600 transition-colors">
        <i data-lucide="map-pin" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">컷발견</span>
      </button>
    </div>
  </nav>

  <!-- 토스트 알림창 -->
  <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-zinc-900 text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-xl opacity-0 translate-y-3 pointer-events-none transition-all duration-300 z-[110] flex items-center gap-1.5">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span id="toast-message">저장 완료!</span>
  </div>

  <!-- [메인 클라이언트 비즈니스 스크립트] -->
  <script>
    // 1. 촬영지 마커 데이터셋 (로컬스토리지가 비어 있을 경우 노출시킬 하이퀄리티 기본 시네마틱 랜드마크 예제셋)
    const DEFAULT_LOCATIONS = [
      {
        id: "loc-preset-1",
        movie: "카모메 식당",
        director: "오기가미 나오코",
        title: "헬싱키 카모메 식당 (Kahvila Kamome)",
        address: "Pursimiehenkatu 12, 00150 Helsinki, Finland",
        desc: "핀란드 헬싱키 한구석에서 정갈한 주먹밥(오니기리)을 팔며 낯선 이방인들과 잔잔하게 교감하는 영화 속 메인 매장입니다. 현재도 실제로 일식 식당으로 운영 중입니다.",
        lat: 60.159495,
        lng: 24.938072,
        stillCuts: ["https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=400&auto=format&fit=crop"],
        realPhotos: ["https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=400&auto=format&fit=crop"]
      },
      {
        id: "loc-preset-2",
        movie: "라라랜드",
        director: "데이미언 셔젤",
        title: "그리피스 천문대 (Griffith Observatory)",
        address: "2800 E Observatory Rd, Los Angeles, CA 90027",
        desc: "미아와 세바스찬이 환상적인 춤과 로맨스를 펼치며 우주 속을 유영하는 장면에 등장한 로스앤젤레스의 최고의 명소입니다.",
        lat: 34.118434,
        lng: -118.300393,
        stillCuts: ["https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=400&auto=format&fit=crop"],
        realPhotos: ["https://images.unsplash.com/photo-1475503572774-15a45e5d60b9?q=80&w=400&auto=format&fit=crop"]
      },
      {
        id: "loc-preset-3",
        movie: "비포 선라이즈",
        director: "리처드 링클레이터",
        title: "빈 알베르티나 미술관 테라스",
        address: "Albertinaplatz 1, 1010 Wien, Austria",
        desc: "제시와 셀린이 헤어지기 직전 마지막 밤을 아쉬워하며 빈의 고요한 가로등 아래 이야기를 나누던 감성 가득한 발코니 뷰 포인트입니다.",
        lat: 48.204655,
        lng: 16.368285,
        stillCuts: ["https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400&auto=format&fit=crop"],
        realPhotos: ["https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=400&auto=format&fit=crop"]
      }
    ];

    let filmingLocations = [];
    let activeFilter = 'all';

    // 로컬스토리지 로드 함수
    function loadLocationsFromStorage() {
      const stored = localStorage.getItem('cineMapSavedLocations');
      if (stored) {
        filmingLocations = JSON.parse(stored);
      } else {
        filmingLocations = [...DEFAULT_LOCATIONS];
        saveLocationsToStorage();
      }
    }

    // 로컬스토리지 저장 함수
    function saveLocationsToStorage() {
      localStorage.setItem('cineMapSavedLocations', JSON.stringify(filmingLocations));
    }

    let map = null;
    let markersGroup = null;
    let clickMarker = null; // 임시 선택용 마커
    let lastClickedCoords = null;
    let lastClickedAddressText = "";

    // 업로드될 다중 파일 임시 데이터 저장소
    let currentStillCutsBase64 = [];
    let currentRealPhotosBase64 = [];

    // 2. 메인 페이지 메뉴 전환 함수 (하단 네비게이션 바)
    function switchPage(pageId) {
      if (pageId === 'add') {
        // 단독 추가 페이지가 열릴 때 다른 콘텐츠들 모두 감추기
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-add-location').classList.remove('hidden');
        return;
      }

      // 등록 페이지 닫혔을 시 원복
      document.getElementById('page-add-location').classList.add('hidden');

      document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
      document.getElementById(`page-${pageId}`).classList.remove('hidden');

      const navTheater = document.getElementById('nav-theater');
      const navCut = document.getElementById('nav-cut');

      if (pageId === 'theater') {
        navTheater.classList.add('text-indigo-600');
        navTheater.classList.remove('text-gray-400');
        navCut.classList.add('text-gray-400');
        navCut.classList.remove('text-indigo-600');
        closeDetailDrawer();
      } else if (pageId === 'cut') {
        navCut.classList.add('text-indigo-600');
        navCut.classList.remove('text-gray-400');
        navTheater.classList.add('text-gray-400');
        navTheater.classList.remove('text-indigo-600');
        
        setTimeout(() => {
          if (!map) {
            initMap();
          } else {
            map.invalidateSize();
          }
        }, 100);
      }
    }

    // 3. 극장 서브 탭 전환 함수
    function switchTheaterTab(tabId) {
      document.querySelectorAll('.theater-tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600');
        btn.classList.add('border-transparent', 'text-gray-400');
      });

      const activeBtn = document.getElementById(`tab-${tabId}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-gray-400');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
      }

      document.querySelectorAll('.theater-tab-content').forEach(c => c.classList.add('hidden'));
      const activeContent = document.getElementById(`content-${tabId}`);
      if (activeContent) {
        activeContent.classList.remove('hidden');
      }
    }

    // 4. 지도 초기화 및 마커 렌더링
    function initMap() {
      map = L.map('map', {
        zoomControl: false 
      }).setView([37.5665, 126.9780], 11);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB &copy; OpenStreetMap'
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);

      markersGroup = L.layerGroup().addTo(map);

      // 지도 클릭(터치) 시 임시 핀 꽂기 및 컷저장 플로팅 버튼 출력
      map.on('click', function(e) {
        closeDetailDrawer();
        closeSearchResults();

        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        lastClickedCoords = e.latlng;

        // 임시 핀 생성/이동
        if (clickMarker) {
          clickMarker.setLatLng(e.latlng);
        } else {
          const selectIcon = L.divIcon({
            className: 'custom-marker-select',
            html: `
              <div class="relative flex items-center justify-center">
                <span class="animate-ping absolute inline-flex h-8 w-8 rounded-full bg-emerald-400 opacity-75"></span>
                <div class="bg-emerald-500 border-2 border-white w-7 h-7 rounded-full shadow-xl flex items-center justify-center relative">
                  <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                </div>
              </div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          clickMarker = L.marker(e.latlng, { icon: selectIcon }).addTo(map);
        }

        // '컷 저장하기' 플로팅 버튼 나타나기
        const floatBtn = document.getElementById('save-cut-float-container');
        floatBtn.classList.remove('scale-0', 'pointer-events-none');
        floatBtn.classList.add('scale-100', 'pointer-events-auto');

        // 실시간 한글 주소 변환(역지오코딩) 시작
        fetchAddressFromCoords(lat, lng);
      });

      // [수정] 지도를 사용자가 드래그(이동)할 때만 핀과 플로팅 버튼 리셋 (줌 인/아웃 시에는 리셋하지 않고 유지)
      map.on('dragstart', function() {
        hideTempMarkerAndButton();
      });

      // 등록된 마커들 렌더링
      renderMarkers();
    }

    // 5. 플로팅 검색바 노출/숨김 기능 (가로 슬라이드 토글 방식으로 개선하여 버튼 가림 방지)
    function toggleSearchInput() {
      const searchBar = document.getElementById('floating-search-bar');
      const isHidden = searchBar.classList.contains('scale-x-0');
      
      if (isHidden) {
        searchBar.classList.remove('scale-x-0', 'opacity-0', 'pointer-events-none');
        searchBar.classList.add('scale-x-100', 'opacity-100', 'pointer-events-auto');
        document.getElementById('map-search-input').focus();
      } else {
        searchBar.classList.add('scale-x-0', 'opacity-0', 'pointer-events-none');
        searchBar.classList.remove('scale-x-100', 'opacity-100', 'pointer-events-auto');
        clearSearch();
      }
    }

    // 6. 감독 필터링 비즈니스 로직
    function filterByDirector(directorName) {
      activeFilter = directorName;
      
      // 기존 필터링 클래스 초기화
      const filters = ['all', 'almodovar', 'park', 'lynch', 'koreeda'];
      filters.forEach(f => {
        const btn = document.getElementById(`filter-${f}`);
        if (btn) {
          btn.className = "bg-white text-gray-700 px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-extrabold border border-gray-100 transition-all hover:bg-zinc-50";
        }
      });

      // 클릭한 필터 활성화 색상 입히기
      let activeBtnId = 'filter-all';
      if (directorName === '페드로 알모도바르') activeBtnId = 'filter-almodovar';
      else if (directorName === '박찬욱') activeBtnId = 'filter-park';
      else if (directorName === '데이비드 린치') activeBtnId = 'filter-lynch';
      else if (directorName === '고레에다 히로카즈') activeBtnId = 'filter-koreeda';

      document.getElementById(activeBtnId).className = "bg-indigo-600 text-white px-3.5 py-2.5 rounded-full shadow-lg flex items-center gap-1.5 whitespace-nowrap text-xs font-black transition-all";

      renderMarkers();
      closeDetailDrawer();
    }

    // 7. 검색 처리 비즈니스 로직 (Nominatim 및 Plus Code 디코딩 연동)
    let searchTimeout = null;

    function handleSearchKeyUp(e) {
      const query = e.target.value.trim();
      const clearBtn = document.getElementById('btn-search-clear');
      
      if (query.length > 0) {
        clearBtn.classList.remove('hidden');
      } else {
        clearBtn.classList.add('hidden');
        closeSearchResults();
        return;
      }

      if (e.key === 'Enter') {
        performSearch(query);
        return;
      }

      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        performSearch(query);
      }, 500);
    }

    async function performSearch(query) {
      if (!query) return;
      const dropdown = document.getElementById('search-results-dropdown');
      const OLC = window.OpenLocationCode || window.openLocationCode;
      
      let isPlusCode = false;
      let extractedCode = "";
      let localityQuery = "";

      if (OLC) {
        const tokens = query.split(/[\s,]+/);
        const plusToken = tokens.find(t => t.includes('+'));
        
        if (plusToken) {
          const cleanCode = plusToken.toUpperCase().replace(/[^2-9C-X+]/g, '');
          if (OLC.isValid(cleanCode)) {
            isPlusCode = true;
            extractedCode = cleanCode;
            localityQuery = tokens.filter(t => !t.includes('+')).join(' ').trim();
          }
        }
      }

      if (isPlusCode) {
        dropdown.innerHTML = '';
        const button = document.createElement('button');
        button.type = 'button';
        button.className = "w-full text-left px-4 py-3 text-xs text-gray-700 hover:bg-gray-50 border-b border-gray-50 flex flex-col gap-1 transition-colors";
        
        let displayTitle = `📍 Google Plus Code: ${extractedCode}`;
        let displayDesc = localityQuery ? `기준 검색 지역: [${localityQuery}]` : "현재 지도 중심점을 기준으로 핀을 찾습니다.";
        
        button.onclick = () => selectPlusCodeResult(extractedCode, localityQuery);
        button.innerHTML = `
          <span class="font-extrabold text-indigo-600 flex items-center gap-1.5">
            <i data-lucide="map" class="w-3.5 h-3.5"></i> ${displayTitle}
          </span>
          <span class="text-[10px] text-gray-500 font-medium">${displayDesc} (클릭 시 이동)</span>
        `;
        dropdown.appendChild(button);
        dropdown.classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&accept-language=ko&limit=5`);
        if (!response.ok) throw new Error("API call error");
        const results = await response.json();
        
        dropdown.innerHTML = '';
        if (results.length === 0) {
          dropdown.innerHTML = '<div class="p-3 text-xs text-gray-400 text-center">검색 결과가 없습니다.</div>';
          dropdown.classList.remove('hidden');
          return;
        }

        results.forEach(item => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = "w-full text-left px-4 py-2.5 text-xs text-gray-700 hover:bg-gray-50 border-b border-gray-50 flex flex-col gap-0.5 transition-colors";
          button.onclick = () => selectSearchResult(item);
          button.innerHTML = `
            <span class="font-bold text-gray-800">${item.name || "지정 장소"}</span>
            <span class="text-[10px] text-gray-400 truncate">${item.display_name}</span>
          `;
          dropdown.appendChild(button);
        });
        
        dropdown.classList.remove('hidden');
      } catch (error) {
        console.warn("Search address error: ", error);
      }
    }

    // OSM Nominatim에 비동기 Geocoding 요청을 수행하는 헬퍼 함수
    async function fetchGeocodeCoords(query) {
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
        if (response.ok) {
          const data = await response.json();
          if (data && data.length > 0) {
            return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          }
        }
      } catch (e) {
        console.warn("Geocode fetch error for query:", query, e);
      }
      return null;
    }

    // [개선 완료] 플러스 코드 분석 후 다단계 지오코딩 폴백 및 정밀 지도 이동 처리 로직
    async function selectPlusCodeResult(code, locality) {
      const OLC = window.OpenLocationCode || window.openLocationCode;
      if (!OLC) return;

      let refLat = 37.5665; // 기본 서울 기준좌표
      let refLng = 126.9780;

      // 로컬 축약형 단축코드(예: 2Q56+34)이고 지역 키워드가 같이 전달된 경우
      if (OLC.isShort(code) && locality) {
        let geocodeSuccess = false;
        
        // 1차 시도: 입력받은 전체 검색어 그대로 검색 시도 (예: "교토시 일본 교토부")
        let coords = await fetchGeocodeCoords(locality);
        
        // 2차 시도: 단어 순서 뒤집어서 검색 시도 (한국어 어순 "도시 + 국가" -> OSM이 선호하는 "국가 + 도시" 순서로 보정)
        if (!coords) {
          const reversed = locality.split(/\s+/).reverse().join(' ');
          coords = await fetchGeocodeCoords(reversed);
        }
        
        // 3차 시도: 의미있는 단어 단위로 쪼개어 검색 시도 (예: "교토시", "교토부")
        if (!coords) {
          const tokens = locality.split(/\s+/);
          for (const token of tokens) {
            const cleanToken = token.trim();
            // 무의미하게 광범위한 국가명은 건너뛰고 2글자 이상의 고유 지명 검색
            if (cleanToken.length >= 2 && !['일본', '한국', '미국', '중국', '유럽', 'japan', 'korea'].includes(cleanToken.toLowerCase())) {
              coords = await fetchGeocodeCoords(cleanToken);
              if (coords) break;
            }
          }
        }

        if (coords) {
          refLat = coords.lat;
          refLng = coords.lng;
        } else if (map) {
          const center = map.getCenter();
          refLat = center.lat;
          refLng = center.lng;
        }
      } else if (OLC.isShort(code) && map) {
        const center = map.getCenter();
        refLat = center.lat;
        refLng = center.lng;
      }

      try {
        let fullCode = code;
        if (OLC.isShort(code)) {
          fullCode = OLC.recoverNearest(code, refLat, refLng);
        }

        const decoded = OLC.decode(fullCode);
        const coords = L.latLng(decoded.latitudeCenter, decoded.longitudeCenter);

        const input = document.getElementById('map-search-input');
        input.value = code + (locality ? " " + locality : "");
        closeSearchResults();

        map.flyTo(coords, 16);
        lastClickedCoords = coords;

        if (clickMarker) {
          clickMarker.setLatLng(coords);
        } else {
          const selectIcon = L.divIcon({
            className: 'custom-marker-select',
            html: `
              <div class="relative flex items-center justify-center">
                <span class="animate-ping absolute inline-flex h-8 w-8 rounded-full bg-emerald-400 opacity-75"></span>
                <div class="bg-emerald-500 border-2 border-white w-7 h-7 rounded-full shadow-xl flex items-center justify-center relative">
                  <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                </div>
              </div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          clickMarker = L.marker(coords, { icon: selectIcon }).addTo(map);
        }

        const floatBtn = document.getElementById('save-cut-float-container');
        floatBtn.classList.remove('scale-0', 'pointer-events-none');
        floatBtn.classList.add('scale-100', 'pointer-events-auto');

        fetchAddressFromCoords(decoded.latitudeCenter, decoded.longitudeCenter, fullCode);

      } catch (err) {
        console.error("Plus Code Decoding Fail:", err);
        showToast("플러스 코드 형식이 올바르지 않거나 디코딩할 수 없는 구역입니다.");
      }
    }

    function selectSearchResult(item) {
      const lat = parseFloat(item.lat);
      const lng = parseFloat(item.lon);
      const coords = L.latLng(lat, lng);
      
      const input = document.getElementById('map-search-input');
      input.value = item.name || item.display_name.split(',')[0];
      
      closeSearchResults();
      map.flyTo(coords, 16);
      lastClickedCoords = coords;
      
      let cleanAddress = item.display_name;
      lastClickedAddressText = cleanAddress;

      if (clickMarker) {
        clickMarker.setLatLng(coords);
      } else {
        const selectIcon = L.divIcon({
          className: 'custom-marker-select',
          html: `
            <div class="relative flex items-center justify-center">
              <span class="animate-ping absolute inline-flex h-8 w-8 rounded-full bg-emerald-400 opacity-75"></span>
              <div class="bg-emerald-500 border-2 border-white w-7 h-7 rounded-full shadow-xl flex items-center justify-center relative">
                <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
              </div>
            </div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });
        clickMarker = L.marker(coords, { icon: selectIcon }).addTo(map);
      }

      const floatBtn = document.getElementById('save-cut-float-container');
      const btnText = document.getElementById('floating-btn-text');
      floatBtn.classList.remove('scale-0', 'pointer-events-none');
      floatBtn.classList.add('scale-100', 'pointer-events-auto');

      // [수정] 텍스트 내부 구조가 깨지지 않도록 textContent 방식으로 업데이트하고 중복 아이콘 방지
      btnText.textContent = `[${lastClickedAddressText.substring(0, 15)}...] 컷 저장하기`;
    }

    function closeSearchResults() {
      const dropdown = document.getElementById('search-results-dropdown');
      dropdown.classList.add('hidden');
    }

    function clearSearch() {
      const input = document.getElementById('map-search-input');
      input.value = '';
      document.getElementById('btn-search-clear').classList.add('hidden');
      closeSearchResults();
    }

    async function fetchAddressFromCoords(lat, lng, fallbackAddress = "") {
      const btnText = document.getElementById('floating-btn-text');
      btnText.textContent = `주소 분석 중...`;

      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=ko`);
        if (!response.ok) throw new Error("API call error");
        const data = await response.json();
        
        const addr = data.address;
        if (addr) {
          const province = addr.province || addr.city || '';
          const district = addr.borough || addr.city_district || addr.county || '';
          const suburb = addr.suburb || addr.neighbourhood || addr.village || '';
          const road = addr.road || '';
          const houseNumber = addr.house_number || '';

          let addressResult = '';
          if (province && province !== district) addressResult += province + ' ';
          if (district) addressResult += district + ' ';
          if (suburb) addressResult += suburb + ' ';
          if (road) addressResult += road + ' ';
          if (houseNumber) addressResult += houseNumber;

          lastClickedAddressText = addressResult.trim() || data.display_name || fallbackAddress || "주소 분석 완료";
        } else {
          lastClickedAddressText = data.display_name || fallbackAddress || "지정된 주소";
        }

        // [수정] 명칭 변경 및 innerText를 이용한 이중 아이콘 방지
        btnText.textContent = `[${lastClickedAddressText.substring(0, 15)}...] 컷 저장하기`;
      } catch (err) {
        console.warn("Reverse geocoding issue: ", err);
        lastClickedAddressText = fallbackAddress || "지정된 좌표 인근";
        btnText.textContent = `이 위치에 컷 저장하기`;
      }
    }

    function hideTempMarkerAndButton() {
      if (clickMarker) {
        map.removeLayer(clickMarker);
        clickMarker = null;
      }
      lastClickedCoords = null;
      const floatBtn = document.getElementById('save-cut-float-container');
      floatBtn.classList.add('scale-0', 'pointer-events-none');
      floatBtn.classList.remove('scale-100', 'pointer-events-auto');
    }

    // 8. 촬영지 마커 렌더링 (필터링 상태 반영)
    function renderMarkers() {
      if (!markersGroup) return;
      markersGroup.clearLayers();

      const filtered = filmingLocations.filter(loc => {
        if (activeFilter === 'all') return true;
        return loc.director === activeFilter;
      });

      filtered.forEach(loc => {
        const pinIcon = L.divIcon({
          className: 'custom-marker-wrapper',
          html: `<div class="bg-indigo-600 hover:bg-indigo-800 border-2 border-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center transition-all transform hover:scale-110 active:scale-95 text-white marker-bounce"><i data-lucide="camera" class="w-4 h-4"></i></div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });

        const marker = L.marker([loc.lat, loc.lng], { icon: pinIcon });
        
        marker.on('click', (e) => {
          L.DomEvent.stopPropagation(e);
          hideTempMarkerAndButton(); 
          showLocationDetails(loc);
        });

        markersGroup.addLayer(marker);
      });
      
      setTimeout(() => lucide.createIcons(), 50);
    }

    // 촬영지 상세 서랍(Bottom Sheet) 데이터 주입 및 가로 다중 스냅 슬라이더 출력
    function showLocationDetails(loc) {
      document.getElementById('detail-movie').innerText = loc.movie;
      document.getElementById('detail-title').innerText = loc.title;
      document.getElementById('detail-desc').innerText = loc.desc;
      document.getElementById('detail-address').innerText = loc.address || "등록된 주소 정보 없음";

      // 촬영지 개별 삭제용 이벤트 등록
      const deleteBtn = document.getElementById('btn-delete-spot');
      deleteBtn.onclick = () => {
        if (confirm("정말로 이 촬영지 아카이브를 영구히 삭제십니까?")) {
          deleteSpot(loc.id);
        }
      };
      
      // ① 명장면 이미지 갤러리 렌더링
      const stillGallery = document.getElementById('detail-still-gallery');
      stillGallery.innerHTML = '';
      if (loc.stillCuts && loc.stillCuts.length > 0) {
        loc.stillCuts.forEach(imgSrc => {
          const item = document.createElement('div');
          item.className = "relative rounded-xl overflow-hidden border border-gray-100 shadow-sm flex-shrink-0 w-36 h-28 snap-center";
          item.innerHTML = `
            <img class="w-full h-full object-cover bg-zinc-900 cursor-zoom-in" src="${imgSrc}" onclick="viewFullImage('${imgSrc}')" alt="명장면">
          `;
          stillGallery.appendChild(item);
        });
      } else {
        stillGallery.innerHTML = `<div class="text-xs text-gray-400 py-3">등록된 이미지 없음</div>`;
      }

      // ② 실제 촬영 성지순례 이미지 갤러리 렌더링
      const realGallery = document.getElementById('detail-real-gallery');
      realGallery.innerHTML = '';
      if (loc.realPhotos && loc.realPhotos.length > 0) {
        loc.realPhotos.forEach(imgSrc => {
          const item = document.createElement('div');
          item.className = "relative rounded-xl overflow-hidden border border-gray-100 shadow-sm flex-shrink-0 w-36 h-28 snap-center";
          item.innerHTML = `
            <img class="w-full h-full object-cover bg-zinc-900 cursor-zoom-in" src="${imgSrc}" onclick="viewFullImage('${imgSrc}')" alt="실제사진">
          `;
          realGallery.appendChild(item);
        });
      } else {
        realGallery.innerHTML = `<div class="text-xs text-gray-400 py-3">등록된 이미지 없음</div>`;
      }

      const drawer = document.getElementById('detail-drawer');
      drawer.classList.remove('translate-y-full');
      drawer.classList.add('translate-y-0');
    }

    function closeDetailDrawer() {
      const drawer = document.getElementById('detail-drawer');
      drawer.classList.remove('translate-y-0');
      drawer.classList.add('translate-y-full');
    }

    // 촬영지 삭제 제어기
    function deleteSpot(spotId) {
      filmingLocations = filmingLocations.filter(loc => loc.id !== spotId);
      saveLocationsToStorage();
      renderMarkers();
      closeDetailDrawer();
      showToast("촬영지가 지도에서 깔끔하게 삭제되었습니다.");
    }

    // 이미지 원본 크기 팝업 뷰어
    function viewFullImage(src) {
      const viewer = document.createElement('div');
      viewer.className = "fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 cursor-zoom-out";
      viewer.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">`;
      viewer.onclick = () => viewer.remove();
      document.body.appendChild(viewer);
    }

    // 9. 나만의 촬영지 등록 단독 페이지 전환 제어
    function openAddLocationPage(hasLocation) {
      switchPage('add'); // 단독 입력 뷰로 전환

      const latField = document.getElementById('form-lat');
      const lngField = document.getElementById('form-lng');
      const addrField = document.getElementById('form-address');

      // 폼 업로드 임시 아키텍처 초기화
      currentStillCutsBase64 = [];
      currentRealPhotosBase64 = [];
      document.getElementById('preview-still-container').innerHTML = '';
      document.getElementById('preview-real-container').innerHTML = '';

      if (hasLocation && lastClickedCoords) {
        latField.value = lastClickedCoords.lat.toFixed(7);
        lngField.value = lastClickedCoords.lng.toFixed(7);
        addrField.value = lastClickedAddressText; 
      } else {
        latField.value = "";
        lngField.value = "";
        addrField.value = "";
      }

      setTimeout(() => lucide.createIcons(), 50);
    }

    function closeAddLocationPage() {
      switchPage('cut'); // 다시 지도 탭으로 전환
      hideTempMarkerAndButton();
    }

    // 다중 이미지 동적 프리뷰 및 base64 수집
    function previewMultipleImages(input, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = ''; // 초기화

      const files = Array.from(input.files);
      const isStill = containerId.includes('still');

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64Data = e.target.result;
          
          if (isStill) {
            currentStillCutsBase64.push(base64Data);
          } else {
            currentRealPhotosBase64.push(base64Data);
          }

          // 프리뷰 카드 동적 마운트
          const card = document.createElement('div');
          card.className = "relative rounded-xl overflow-hidden flex-shrink-0 w-20 h-20 border shadow-sm";
          card.innerHTML = `
            <img class="w-full h-full object-cover" src="${base64Data}">
            <button type="button" onclick="this.parentElement.remove(); removeBase64('${base64Data}', ${isStill})" class="absolute top-1 right-1 bg-black/60 hover:bg-black/80 text-white rounded-full p-0.5 transition-colors">
              <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
          `;
          container.appendChild(card);
          lucide.createIcons();
        };
        reader.readAsDataURL(file);
      });
    }

    // 다중 업로드 선택 후 부분 삭제 대응용 헬퍼 함수
    function removeBase64(data, isStill) {
      if (isStill) {
        currentStillCutsBase64 = currentStillCutsBase64.filter(item => item !== data);
      } else {
        currentRealPhotosBase64 = currentRealPhotosBase64.filter(item => item !== data);
      }
    }

    // 촬영지 새로운 데이터 가공 및 로컬 영구저장 처리
    function handleNewLocationSubmit(e) {
      e.preventDefault();

      let latVal = document.getElementById('form-lat').value;
      let lngVal = document.getElementById('form-lng').value;
      
      if (!latVal || !lngVal) {
        const center = map.getCenter();
        latVal = center.lat;
        lngVal = center.lng;
      } else {
        latVal = parseFloat(latVal);
        lngVal = parseFloat(lngVal);
      }

      const movie = document.getElementById('form-movie').value;
      const director = document.getElementById('form-director').value;
      const title = document.getElementById('form-title').value;
      const desc = document.getElementById('form-desc').value;
      const address = document.getElementById('form-address').value;

      // 이미지 미등록 시 기본 고해상도 영화 감성 플레이스홀더 제공
      let stillCuts = [...currentStillCutsBase64];
      let realPhotos = [...currentRealPhotosBase64];

      if (stillCuts.length === 0) {
        stillCuts.push("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop");
      }
      if (realPhotos.length === 0) {
        realPhotos.push("https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=600&auto=format&fit=crop");
      }

      const newLoc = {
        id: `loc-custom-${Date.now()}`,
        movie,
        director,
        title,
        desc,
        address,
        lat: latVal,
        lng: lngVal,
        stillCuts: stillCuts,
        realPhotos: realPhotos
      };

      // 마커 배열 처음에 배치 및 로컬 스토리지에 즉각 싱크탱크 동기화
      filmingLocations.unshift(newLoc);
      saveLocationsToStorage();

      renderMarkers();
      map.flyTo([latVal, lngVal], 14);

      // 입력폼 완전 리셋
      document.getElementById('add-location-form').reset();
      currentStillCutsBase64 = [];
      currentRealPhotosBase64 = [];
      document.getElementById('preview-still-container').innerHTML = '';
      document.getElementById('preview-real-container').innerHTML = '';

      closeAddLocationPage();
      showToast("내 지도에 명장면 촬영지가 성공적으로 저장되었습니다!");
      
      // 저장 직후 생성된 핀 상세 카드를 하단 슬라이더로 즉시 개방
      setTimeout(() => {
        showLocationDetails(newLoc);
      }, 550);
    }

    // 알림용 토스트 팝업 함수
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.innerText = message;

      toast.classList.remove('opacity-0', 'translate-y-3', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-3', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    // 초기 실행 환경 구성
    window.onload = function() {
      // 로컬데이터 자동 연동
      loadLocationsFromStorage();
      
      lucide.createIcons();
      switchTheaterTab('ku');
      switchPage('theater');
    }
  </script>
</body>
