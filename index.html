<!DOCTYPE html>
<html lang="ko" class="h-full overflow-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CineMap - 영화 시간표 & 촬영지 지도</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Leaflet Map CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* iOS 및 모바일 브라우저 터치 미끄러짐 최적화 */
    .scroll-container {
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* 스크롤바 숨기기 스타일 */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 지도 마커 커스텀 스타일 */
    .custom-marker {
      background: #4f46e5;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      text-align: center;
      line-height: 30px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-zinc-50 h-[100dvh] flex flex-col font-sans overflow-hidden select-none">

  <!-- [상단 헤더] -->
  <header class="bg-white border-b shrink-0 z-40 shadow-sm px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div class="bg-indigo-600 text-white p-1.5 rounded-lg">
        <i data-lucide="map" class="w-5 h-5"></i>
      </div>
      <div>
        <h1 class="text-lg font-black tracking-tight text-gray-900">cinemap</h1>
        <p class="text-[10px] text-gray-500 -mt-1">시간표 대시보드 & 촬영지 아카이브</p>
      </div>
    </div>
    <div id="active-badge" class="text-xs bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full font-semibold flex items-center gap-1">
      <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full animate-pulse"></span>
      영화관 모드
    </div>
  </header>

  <!-- [메인 콘텐츠 컨테이너] -->
  <main class="flex-1 overflow-hidden relative flex flex-col">

    <!-- ==================== MENU 1: 영화관 시간표 (기존 기능 그대로 보존) ==================== -->
    <div id="page-theater" class="page-content w-full h-full flex flex-col overflow-hidden">
      <!-- 상단 영화관 서브 탭 버튼 영역 -->
      <div class="bg-white border-b shrink-0">
        <div class="flex overflow-x-auto whitespace-nowrap scrollbar-none px-2" id="theater-tab-container">
          <button onclick="switchTheaterTab('ku')" id="tab-ku" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-all">
            KU 시네마
          </button>
          <button onclick="switchTheaterTab('seoul')" id="tab-seoul" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            서울아트시네마
          </button>
          <button onclick="switchTheaterTab('megabox')" id="tab-megabox" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            메가박스 군자
          </button>
          <button onclick="switchTheaterTab('wangcgv')" id="tab-wangcgv" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            왕십리 CGV
          </button>
          <button onclick="switchTheaterTab('laika')" id="tab-laika" class="theater-tab-btn px-4 py-3 text-sm font-bold border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
            라이카 시네마
          </button>
        </div>
      </div>

      <!-- 극장 시간표 iframe 본문 영역 -->
      <div class="flex-1 p-3 md:p-4 overflow-hidden flex flex-col">
        <div class="flex-1 relative bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col">
          
          <!-- KU 시네마 -->
          <div id="content-ku" class="theater-tab-content w-full h-full flex-1 scroll-container">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://kucinema.net/timetable/" 
                class="w-[125%] h-[1500px] origin-top-left scale-[1.0] md:scale-[1.2]"
                title="KU Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 서울아트시네마 -->
          <div id="content-seoul" class="theater-tab-content w-full h-full flex-1 scroll-container hidden">
            <div class="w-full h-full overflow-auto" style="-webkit-overflow-scrolling: touch;">
              <iframe 
                src="https://www.cinematheque.seoul.kr/bbs/content.php?co_id=timetable" 
                class="w-full h-[1500px]"
                title="Seoul Art Cinema Timetable">
              </iframe>
            </div>
          </div>

          <!-- 메가박스 군자 -->
          <div id="content-megabox" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1396259461/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Megabox Gunja Timetable">
            </iframe>
          </div>

          <!-- 왕십리 CGV -->
          <div id="content-wangcgv" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/12964379/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Wangsimni CGV Timetable">
            </iframe>
          </div>

          <!-- 라이카 시네마 -->
          <div id="content-laika" class="theater-tab-content w-full h-full flex-1 relative overflow-hidden hidden">
            <iframe 
              src="https://m.place.naver.com/theater/1156408497/movie" 
              class="absolute top-0 left-0 w-full h-[calc(100%+56px)]"
              title="Laika Cinema Timetable">
            </iframe>
          </div>

        </div>
      </div>
    </div>


    <!-- ==================== MENU 2: 컷발견 (지도 기반 영화 촬영지) ==================== -->
    <div id="page-cut" class="page-content w-full h-full flex flex-col overflow-hidden hidden">
      <div class="flex-1 flex flex-col md:flex-row relative overflow-hidden">
        
        <!-- [좌측/상단]: 메인 지도 영역 -->
        <div class="flex-1 relative min-h-[45vh] md:min-h-0">
          <div id="map" class="w-full h-full z-10"></div>
          <!-- 지도 위 플로팅 '촬영지 등록하기' 버튼 -->
          <button onclick="openAddLocationModal()" class="absolute bottom-4 right-4 z-20 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-full shadow-lg flex items-center gap-2 text-sm transition-all transform hover:scale-105">
            <i data-lucide="plus-circle" class="w-5 h-5"></i>
            나도 컷 발견하기
          </button>
        </div>

        <!-- [우측/하단]: 선택된 촬영지 정보 상세 카드 패널 -->
        <div id="detail-panel" class="w-full md:w-[380px] bg-white border-t md:border-t-0 md:border-l shrink-0 flex flex-col shadow-xl z-20 overflow-y-auto">
          <!-- 선택 전 대기 화면 -->
          <div id="detail-empty" class="p-8 text-center my-auto flex flex-col items-center justify-center text-gray-400">
            <div class="bg-indigo-50 text-indigo-500 p-4 rounded-full mb-3">
              <i data-lucide="map-pin" class="w-8 h-8"></i>
            </div>
            <p class="font-bold text-gray-700">촬영지를 발견해 보세요!</p>
            <p class="text-xs text-gray-400 mt-1">지도의 핀을 탭하거나 아래 리스트에서 선택하시면 영화 촬영지 사진 비교를 감상할 수 있습니다.</p>
            
            <!-- 리스트 스냅샷 -->
            <div class="w-full mt-6 text-left">
              <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">현재 기록된 촬영지</h4>
              <div id="quick-list" class="space-y-1.5 max-h-[150px] overflow-y-auto pr-1">
                <!-- 동적 리스트가 여기에 렌더링됨 -->
              </div>
            </div>
          </div>

          <!-- 촬영지 상세 정보 카드 (선택 시 노출) -->
          <div id="detail-active" class="hidden flex flex-col h-full">
            <div class="relative h-48 bg-zinc-900 shrink-0">
              <img id="detail-still" src="" class="w-full h-full object-cover opacity-90" alt="영화 스틸컷" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
              <span id="detail-movie" class="absolute top-3 left-3 bg-indigo-600 text-white text-[11px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow-md"></span>
              <div class="absolute bottom-3 left-3 right-3 text-white">
                <h3 id="detail-title" class="text-lg font-black leading-tight drop-shadow"></h3>
                <p id="detail-desc" class="text-xs text-gray-200 mt-1 line-clamp-1 opacity-90"></p>
              </div>
            </div>

            <!-- 사진 비교 탭 가이드 -->
            <div class="p-4 flex-1 flex flex-col gap-4 overflow-y-auto">
              <div>
                <div class="flex items-center justify-between mb-2">
                  <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">스틸컷 vs 실제 현장 비교</span>
                  <span class="text-[10px] text-indigo-600 bg-indigo-50 font-medium px-2 py-0.5 rounded-full">성지순례 인증</span>
                </div>
                <!-- 2분할 뷰 카드 -->
                <div class="grid grid-cols-2 gap-2">
                  <div class="relative rounded-lg overflow-hidden border">
                    <img id="detail-still-sub" class="w-full h-32 object-cover" src="" alt="영화 스틸">
                    <span class="absolute bottom-1 right-1 bg-black/60 text-white text-[9px] px-1.5 py-0.5 rounded">영화 속 장면</span>
                  </div>
                  <div class="relative rounded-lg overflow-hidden border">
                    <img id="detail-real" class="w-full h-32 object-cover bg-gray-100" src="" alt="실제 사진">
                    <span class="absolute bottom-1 right-1 bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded">실제 현장 사진</span>
                  </div>
                </div>
              </div>

              <!-- 상세 설명 설명글 -->
              <div class="bg-zinc-50 rounded-xl p-3 border border-zinc-100">
                <span class="text-xs font-bold text-gray-500 block mb-1">상세 촬영 현장 소개</span>
                <p id="detail-desc-full" class="text-sm text-gray-700 leading-relaxed"></p>
              </div>
            </div>
            
            <div class="p-3 border-t bg-gray-50 shrink-0 flex justify-end">
              <button onclick="resetDetailPanel()" class="text-xs font-bold text-gray-500 hover:text-gray-700 px-3 py-1.5">닫기</button>
            </div>
          </div>

        </div>
      </div>
    </div>

  </main>

  <!-- [하단 앱 고정 네비게이션 탭바] -->
  <nav class="bg-white border-t shrink-0 z-50 shadow-lg">
    <div class="flex h-16 justify-around items-center">
      <!-- 탭 1: 영화관 -->
      <button onclick="switchPage('theater')" id="nav-theater" class="flex flex-col items-center justify-center w-full h-full text-indigo-600 transition-colors">
        <i data-lucide="film" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">영화관</span>
      </button>
      <!-- 탭 2: 컷발견 -->
      <button onclick="switchPage('cut')" id="nav-cut" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-indigo-600 transition-colors">
        <i data-lucide="map-pin" class="w-5 h-5 mb-1"></i>
        <span class="text-xs font-bold">컷발견</span>
      </button>
    </div>
  </nav>

  <!-- ==================== 촬영지 추가용 커스텀 모달 다이얼로그 ==================== -->
  <div id="add-location-modal" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <!-- 모달 헤더 -->
      <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shrink-0">
        <h3 class="font-black text-lg flex items-center gap-1.5">
          <i data-lucide="plus-circle" class="w-5 h-5"></i>
          나만의 명장면 촬영지 등록
        </h3>
        <button onclick="closeAddLocationModal()" class="p-1 hover:bg-indigo-700 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- 모달 폼 -->
      <form id="add-location-form" onsubmit="handleNewLocationSubmit(event)" class="p-5 overflow-y-auto flex-1 space-y-4">
        <!-- 지도 안내 문구 -->
        <div class="p-2.5 bg-indigo-50 text-indigo-800 text-xs rounded-lg flex items-center gap-2">
          <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
          <span>지도를 마우스/터치로 탭하여 핀의 위치 좌표를 지정하세요.</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <!-- 위도/경도 자동 매핑 표시 -->
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">선택 위도 (Lat)</label>
            <input type="text" id="form-lat" readonly required class="w-full bg-gray-100 border text-xs px-2.5 py-2 rounded-lg text-gray-500 focus:outline-none" placeholder="지도 터치 시 지정">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">선택 경도 (Lng)</label>
            <input type="text" id="form-lng" readonly required class="w-full bg-gray-100 border text-xs px-2.5 py-2 rounded-lg text-gray-500 focus:outline-none" placeholder="지도 터치 시 지정">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">영화 제목 선택</label>
          <select id="form-movie" required class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500">
            <option value="">영화 선택...</option>
            <option value="기생충">기생충 (Parasite)</option>
            <option value="엽기적인 그녀">엽기적인 그녀</option>
            <option value="괴물">괴물 (The Host)</option>
            <option value="클래식">클래식 (The Classic)</option>
            <option value="뷰티 인사이드">뷰티 인사이드</option>
            <option value="기타Direct">기타 (직접 입력)</option>
          </select>
          <input type="text" id="form-movie-custom" class="w-full border px-3 py-2 text-sm rounded-lg mt-2 hidden" placeholder="영화 제목 직접 입력">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">촬영지 이름</label>
          <input type="text" id="form-title" required class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="예: 돼지쌀슈퍼, 괴물 동상 앞">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">촬영지 상세설명</label>
          <textarea id="form-desc" required rows="2" class="w-full border px-3 py-2 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="장면에 대한 설명이나 성지순례 후기를 기록해 주세요."></textarea>
        </div>

        <!-- 이미지 수동 업로드 (Local File 및 Preview) -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">① 영화 속 스틸컷 업로드</label>
            <div class="border border-dashed rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-24">
              <input type="file" id="form-still-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this, 'preview-still')">
              <div id="preview-still-placeholder" class="text-center text-gray-400">
                <i data-lucide="image" class="w-5 h-5 mx-auto mb-1"></i>
                <span class="text-[10px]">사진 첨부</span>
              </div>
              <img id="preview-still" class="absolute inset-0 w-full h-full object-cover rounded-lg hidden" alt="스틸컷 프리뷰">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">② 내 실제 촬영 사진 업로드</label>
            <div class="border border-dashed rounded-lg p-2 flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100 cursor-pointer relative h-24">
              <input type="file" id="form-real-file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this, 'preview-real')">
              <div id="preview-real-placeholder" class="text-center text-gray-400">
                <i data-lucide="image" class="w-5 h-5 mx-auto mb-1"></i>
                <span class="text-[10px]">사진 첨부</span>
              </div>
              <img id="preview-real" class="absolute inset-0 w-full h-full object-cover rounded-lg hidden" alt="실제사진 프리뷰">
            </div>
          </div>
        </div>

        <!-- 등록 버튼 -->
        <div class="pt-2 flex gap-2">
          <button type="button" onclick="closeAddLocationModal()" class="w-1/3 border font-bold py-2.5 rounded-xl text-gray-600 text-sm hover:bg-gray-50 transition-colors">취소</button>
          <button type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors shadow-md">내 지도에 저장하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 토스트 알림창 -->
  <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-zinc-900 text-white text-xs font-bold px-4 py-2.5 rounded-full shadow-xl opacity-0 translate-y-3 pointer-events-none transition-all duration-300 z-[110] flex items-center gap-1.5">
    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>
    <span id="toast-message">저장 완료!</span>
  </div>

  <!-- [메인 클라이언트 비즈니스 스크립트] -->
  <script>
    // 1. 촬영지 마커 데이터셋 (사용자 요청에 따라 기생충 '우리슈퍼'를 제외한 데이터 구축)
    let filmingLocations = [
      {
        id: "loc-2",
        title: "영화 '괴물' 원효대교 하부 정비소",
        movie: "괴물",
        lat: 37.531853,
        lng: 126.937209,
        desc: "강두(송강호) 일가가 매점을 운영하고, 괴물이 한강에서 기어올라와 서리(고아성)를 납치해 달아나던 한강시민공원 원효대교 근방 터입니다.",
        stillCut: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=600&auto=format&fit=crop",
        realPhoto: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop"
      },
      {
        id: "loc-3",
        title: "영화 '클래식' 연세대 박물관 앞",
        movie: "클래식",
        lat: 37.561917,
        lng: 126.936833,
        desc: "지혜(손예진)와 상민(조인성)이 비를 맞으며 옷을 우산 삼아 함께 달리던 캠퍼스 명장면이 촬영된 Yonsei University 광장입니다.",
        stillCut: "https://images.unsplash.com/photo-1518173946687-a4c8a383392e?q=80&w=600&auto=format&fit=crop",
        realPhoto: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=600&auto=format&fit=crop"
      }
    ];

    let map = null;
    let markersGroup = null;
    let clickMarker = null; // 신규 등록할 때 사용자가 클릭한 지점을 표시할 임시 마커

    // 2. 메인 페이지 메뉴 전환 함수 (하단 내비게이션 바)
    function switchPage(pageId) {
      // 모든 페이지 감추기
      document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
      // 선택한 페이지 표시
      document.getElementById(`page-${pageId}`).classList.remove('hidden');

      // 하단 탭 버튼 강조 전환
      const navTheater = document.getElementById('nav-theater');
      const navCut = document.getElementById('nav-cut');
      const activeBadge = document.getElementById('active-badge');

      if (pageId === 'theater') {
        navTheater.classList.add('text-indigo-600');
        navTheater.classList.remove('text-gray-400');
        navCut.classList.add('text-gray-400');
        navCut.classList.remove('text-indigo-600');
        activeBadge.innerHTML = `<span class="w-1.5 h-1.5 bg-indigo-600 rounded-full animate-pulse"></span>영화관 모드`;
      } else if (pageId === 'cut') {
        navCut.classList.add('text-indigo-600');
        navCut.classList.remove('text-gray-400');
        navTheater.classList.add('text-gray-400');
        navTheater.classList.remove('text-indigo-600');
        activeBadge.innerHTML = `<span class="w-1.5 h-1.5 bg-indigo-600 rounded-full animate-pulse"></span>컷발견 지도`;
        
        // 지도가 숨겨져있던 탭에서 활성화될 때 레이아웃 왜곡 깨짐 방지
        setTimeout(() => {
          if (!map) {
            initMap();
          } else {
            map.invalidateSize();
          }
        }, 100);
      }
    }

    // 3. 극장 서브 탭 전환 함수 (기존 극장 시간표 기능)
    function switchTheaterTab(tabId) {
      // 극장 서브 탭 버튼 스타일 초기화
      document.querySelectorAll('.theater-tab-btn').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600');
        btn.classList.add('border-transparent', 'text-gray-400');
      });

      // 선택 탭 활성화
      const activeBtn = document.getElementById(`tab-${tabId}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-gray-400');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600');
      }

      // 모든 시간표 뷰 가리고 활성화된 극장만 보이기
      document.querySelectorAll('.theater-tab-content').forEach(c => c.classList.add('hidden'));
      const activeContent = document.getElementById(`content-${tabId}`);
      if (activeContent) {
        activeContent.classList.remove('hidden');
      }
    }

    // 4. 지도 초기화 및 마커 렌더링
    function initMap() {
      // 서울 중심으로 지도 생성
      map = L.map('map', {
        zoomControl: false // 모바일 환경을 고려해 줌 컨트롤 숨김 또는 아래쪽 재설정
      }).setView([37.550, 126.955], 12);

      // 깔끔한 지도 테마 타일 레이어 적용
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      // 줌 컨트롤 오른쪽 하단 재배치
      L.control.zoom({ position: 'bottomright' }).addTo(map);

      markersGroup = L.layerGroup().addTo(map);

      // 지도 클릭 시 좌표 자동 선택 기능 (촬영지 등록용)
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        
        // 현재 등록 모달이 켜져 있든 꺼져 있든 데이터 입력 처리 유도
        document.getElementById('form-lat').value = lat.toFixed(7);
        document.getElementById('form-lng').value = lng.toFixed(7);

        // 지도상에 임시 선택 마커 생성/이동
        if (clickMarker) {
          clickMarker.setLatLng(e.latlng);
        } else {
          const selectIcon = L.divIcon({
            className: 'custom-marker-select',
            html: `<div class="bg-emerald-500 border-2 border-white w-6 h-6 rounded-full shadow-lg flex items-center justify-center animate-bounce"><div class="w-2 h-2 bg-white rounded-full"></div></div>`,
            iconSize: [24, 24]
          });
          clickMarker = L.marker(e.latlng, { icon: selectIcon }).addTo(map);
        }

        showToast("핀 위치가 지정되었습니다! 다이얼로그에서 정보를 작성하세요.");
        openAddLocationModal(); // 모달 띄우기
      });

      // 마커들 다시 그리기
      renderMarkers();
      renderQuickList();
    }

    // 5. 마커 그리기 함수
    function renderMarkers() {
      if (!markersGroup) return;
      markersGroup.clearLayers();

      filmingLocations.forEach(loc => {
        // 커스텀 원형 마커 아이콘 생성
        const pinIcon = L.divIcon({
          className: 'custom-marker-wrapper',
          html: `<div class="bg-indigo-600 hover:bg-indigo-800 border-2 border-white w-7 h-7 rounded-full shadow-lg flex items-center justify-center transition-all transform hover:scale-125 text-white"><i data-lucide="camera" class="w-3.5 h-3.5"></i></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });

        const marker = L.marker([loc.lat, loc.lng], { icon: pinIcon });
        
        // 마커 클릭 시 우측 상세 패널 보이기
        marker.on('click', (e) => {
          L.DomEvent.stopPropagation(e);
          showLocationDetails(loc);
        });

        markersGroup.addLayer(marker);
      });
      
      // Lucide 아이콘 새로 그리기
      setTimeout(() => lucide.createIcons(), 50);
    }

    // 6. 촬영지 퀵 리스트 정보 렌더링
    function renderQuickList() {
      const qList = document.getElementById('quick-list');
      qList.innerHTML = '';

      if (filmingLocations.length === 0) {
        qList.innerHTML = '<div class="text-xs text-gray-400">등록된 촬영지가 없습니다.</div>';
        return;
      }

      filmingLocations.forEach(loc => {
        const item = document.createElement('button');
        item.className = "w-full text-left p-2 hover:bg-gray-100 rounded-lg border border-gray-100 transition-colors flex items-center gap-2 text-xs text-gray-700 font-medium";
        item.onclick = () => {
          showLocationDetails(loc);
          // 지도를 해당 마커 위치로 부드럽게 이동
          if (map) {
            map.flyTo([loc.lat, loc.lng], 14);
          }
        };
        item.innerHTML = `
          <div class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[9px] font-bold shrink-0">${loc.movie}</div>
          <div class="truncate flex-1">${loc.title}</div>
          <i data-lucide="chevron-right" class="w-3 h-3 text-gray-400"></i>
        `;
        qList.appendChild(item);
      });

      lucide.createIcons();
    }

    // 7. 촬영지 상세 보기 렌더링
    function showLocationDetails(loc) {
      document.getElementById('detail-empty').classList.add('hidden');
      document.getElementById('detail-active').classList.remove('hidden');

      document.getElementById('detail-movie').innerText = loc.movie;
      document.getElementById('detail-title').innerText = loc.title;
      document.getElementById('detail-desc').innerText = loc.desc;
      document.getElementById('detail-desc-full').innerText = loc.desc;
      
      // 이미지 소스 매핑
      document.getElementById('detail-still').src = loc.stillCut;
      document.getElementById('detail-still-sub').src = loc.stillCut;
      document.getElementById('detail-real').src = loc.realPhoto;
    }

    // 상세 패널 초기화(선택 안 됨으로 되돌리기)
    function resetDetailPanel() {
      document.getElementById('detail-active').classList.add('hidden');
      document.getElementById('detail-empty').classList.remove('hidden');
    }

    // 8. 촬영지 등록 모달 관리
    function openAddLocationModal() {
      document.getElementById('add-location-modal').classList.remove('hidden');
      
      // 모달 내부 아이콘 생성
      setTimeout(() => lucide.createIcons(), 50);

      // 혹시 영화 선택이 "직접 입력"인 경우 필드 상태 확인
      toggleMovieCustomField();
    }

    function closeAddLocationModal() {
      document.getElementById('add-location-modal').classList.add('hidden');
      // 임시로 추가되었던 좌표용 초록색 마커 제거
      if (clickMarker) {
        map.removeLayer(clickMarker);
        clickMarker = null;
      }
    }

    // 영화 드롭다운 값 변경 감지 (기타 선택 시 직접 입력 활성화)
    document.getElementById('form-movie').addEventListener('change', toggleMovieCustomField);
    
    function toggleMovieCustomField() {
      const select = document.getElementById('form-movie');
      const customInput = document.getElementById('form-movie-custom');
      if (select.value === '기타Direct') {
        customInput.classList.remove('hidden');
        customInput.required = true;
      } else {
        customInput.classList.add('hidden');
        customInput.required = false;
      }
    }

    // 이미지 첨부 시 프리뷰 미리보기 및 인메모리 임시 URL 할당 기능
    function previewImage(input, previewId) {
      const file = input.files[0];
      const previewImg = document.getElementById(previewId);
      const placeholder = document.getElementById(`${previewId}-placeholder`);

      if (file) {
        // 모바일 브라우저 세션 생명주기 내에서 사용가능한 Blob URL 생성 적용
        const objectUrl = URL.createObjectURL(file);
        previewImg.src = objectUrl;
        previewImg.classList.remove('hidden');
        placeholder.classList.add('hidden');
      }
    }

    // 9. 새로운 촬영지 추가 제출 폼 제출 핸들러
    function handleNewLocationSubmit(e) {
      e.preventDefault();

      const lat = parseFloat(document.getElementById('form-lat').value);
      const lng = parseFloat(document.getElementById('form-lng').value);
      const title = document.getElementById('form-title').value;
      const desc = document.getElementById('form-desc').value;

      // 영화 제목 선택값 추출
      let movie = document.getElementById('form-movie').value;
      if (movie === '기타Direct') {
        movie = document.getElementById('form-movie-custom').value;
      }

      // 업로드 이미지 체크 (미지정 시 더미 고해상도 영화 감성 테마 Unsplash 플레이스홀더 제공)
      let stillCut = document.getElementById('preview-still').src;
      let realPhoto = document.getElementById('preview-real').src;

      if (!stillCut || stillCut.includes(window.location.host) === false) {
        stillCut = "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop";
      }
      if (!realPhoto || realPhoto.includes(window.location.host) === false) {
        realPhoto = "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=600&auto=format&fit=crop";
      }

      // 새 데이터 배열에 추가
      const newLocObj = {
        id: `loc-${Date.now()}`,
        title,
        movie,
        lat,
        lng,
        desc,
        stillCut,
        realPhoto
      };

      filmingLocations.unshift(newLocObj); // 처음에 삽입

      // UI 및 지도 마커 업데이트
      renderMarkers();
      renderQuickList();
      showLocationDetails(newLocObj); // 생성된 상세정보 즉시 로드

      // 폼 리셋
      document.getElementById('add-location-form').reset();
      document.getElementById('preview-still').classList.add('hidden');
      document.getElementById('preview-still').src = '';
      document.getElementById('preview-still-placeholder').classList.remove('hidden');
      document.getElementById('preview-real').classList.add('hidden');
      document.getElementById('preview-real').src = '';
      document.getElementById('preview-real-placeholder').classList.remove('hidden');

      closeAddLocationModal();
      showToast("내 지도에 명장면 성지순례가 성공적으로 등록되었습니다!");
    }

    // 10. 토스트 알림 함수
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.innerText = message;

      toast.classList.remove('opacity-0', 'translate-y-3', 'pointer-events-none');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-3', 'pointer-events-none');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 3000);
    }

    // 페이지 첫 로드 실행
    window.onload = function() {
      lucide.createIcons();
      // 영화관 탭 초기 활성화
      switchTheaterTab('ku');
      // 첫 진입 화면 세팅
      switchPage('theater');
    }
  </script>
</body>
</html>
